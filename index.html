  // Shows students in the chosen class grouped by fee status:
  // 'paid' = fully paid (no balance), 'partial' = paid something but not
  // the full amount, 'unpaid' = paid nothing at all. This lets a sadhar
  // or committee member quickly see who has paid and who hasn't, instead
  // of only seeing a blended dues list.
  showClassStatusList(mode){
    const cls = (document.getElementById("fee-class-select")||{}).value || "";
    const listBox = document.getElementById("fee-class-list");
    if(!listBox) return;
    if(!cls){ listBox.innerHTML = `<p class="muted" style="margin-top:8px;">ദയവായി ഒരു ക്ലാസ് സെലക്ട് ചെയ്യുക</p>`; return; }

    const studentsInClass = DB.data.students.filter(s => s.cls === cls);
    const annual = DB.data.fees.annual || 0;
    const withStatus = studentsInClass.map(s => {
      const paid = s.paidTotal || 0;
      const balance = Math.max(annual - paid, 0);
      let status;
      if(balance <= 0) status = 'paid';
      else if(paid > 0) status = 'partial';
      else status = 'unpaid';
      return { s, paid, balance, status };
    }).filter(x => x.status === mode)
      .sort((a,b) => b.balance - a.balance);

    const titles = { paid: "✅ പൂർണ്ണമായി അടച്ചവർ", partial: "🟡 ഭാഗികമായി അടച്ചവർ", unpaid: "❌ ഒന്നും അടക്കാത്തവർ" };
    const emptyMsgs = {
      paid: "ഈ ക്ലാസ്സിൽ ഇതുവരെ ആരും പൂർണ്ണമായി ഫീസ് അടച്ചിട്ടില്ല",
      partial: "ഈ ക്ലാസ്സിൽ ഭാഗികമായി ഫീസ് അടച്ച കുട്ടികൾ ഇല്ല",
      unpaid: "🎉 ഈ ക്ലാസ്സിൽ എല്ലാവരും എന്തെങ്കിലും ഫീസ് അടച്ചിട്ടുണ്ട്"
    };

    if(!withStatus.length){
      listBox.innerHTML = `<div class="divider"></div><p class="muted" style="margin-top:8px;">${emptyMsgs[mode]}</p>`;
      return;
    }

    let html = `<div class="divider"></div>
      <div class="row" style="margin-bottom:8px;">
        <div class="card-title" style="font-size:14px;flex:1;">${CLASS_LABELS[cls]||cls} — ${titles[mode]} (${withStatus.length})</div>
        ${mode!=='paid' ? `<button class="btn-wa" style="font-size:12px;padding:8px 10px;" onclick="FeeShared.remindAllInClass('${cls}')">📩 ഓർമ്മിപ്പിക്കൽ അയക്കുക</button>` : ''}
      </div>`;
    withStatus.forEach(({s, paid, balance}) => {
      html += `<div class="row" style="padding:10px 0;border-bottom:1px solid #eee;">
        <div style="display:flex;flex:1;align-items:center;cursor:pointer;" onclick="FeeShared.selectStudentForFee('${s.id}')">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1;margin-left:10px;">
          <div style="font-weight:600;">${U.esc(s.name)}</div>
          <div class="muted" style="font-size:12px;">Reg No: ${s.reg} ${mode!=='paid' ? `• അടച്ചത്: ₹${paid}` : ''}</div>
        </div>
        ${mode!=='paid' ? `<div style="font-weight:700;color:var(--rose);margin-right:10px;">₹${balance}</div>` : `<div style="font-weight:700;color:var(--moss);margin-right:10px;">✅</div>`}
        </div>
        ${mode!=='paid' ? `<button class="btn-wa" style="font-size:18px;padding:6px 10px;" onclick='FeeShared.remindOne("${s.id}")'>📩</button>` : ''}
      </div>`;
    });
    listBox.innerHTML = html;
  },

  // Sends a fee-due reminder to a single student's parent.
  remindOne(studentId){
    const s = U.studentById(studentId);
    if(!s || !s.phone){ U.toast("ഫോൺ നമ്പർ ലഭ്യമല്ല"); return; }
    U.sendWhatsApp(s.phone, U.feeDueReminderMessage(s));
  },

  // Walks through every due student in a class, one at a time, opening
  // WhatsApp for each — since WhatsApp doesn't allow truly automatic bulk
  // sending, this queues them with a "next" step so the sender can move
  // through the whole class quickly without hunting for each number.
  _remindQueue: [],
  remindAllInClass(cls){
    const annual = DB.data.fees.annual || 0;
    this._remindQueue = DB.data.students
      .filter(s => s.cls === cls && Math.max(annual - (s.paidTotal||0), 0) > 0 && s.phone)
      .map(s => s.id);
    if(!this._remindQueue.length){ U.toast("ഫോൺ നമ്പർ ഉള്ള കുടിശ്ശികക്കാർ ഇല്ല"); return; }
    this._remindNext();
  },
  _remindNext(){
    if(!this._remindQueue.length){ U.toast("എല്ലാവർക്കും അയച്ചു കഴിഞ്ഞു ✓"); return; }
    const id = this._remindQueue.shift();
    const s = U.studentById(id);
    if(!s){ this._remindNext(); return; }
    const overlay = document.createElement("div");
    overlay.id = "remind-queue-overlay";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;";
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:20px;max-width:340px;width:100%;">
        <div style="font-weight:700;font-size:15px;margin-bottom:10px;">${U.esc(s.name)} (Reg: ${s.reg}) — ഓർമ്മിപ്പിക്കൽ അയക്കണോ?</div>
        <button class="primary-btn btn-block" style="margin-bottom:10px;" onclick="FeeShared._remindSendCurrent('${s.id}')">📩 അയക്കുക</button>
        <button class="outline-btn btn-block" style="margin-bottom:10px;" onclick="FeeShared._remindNext()">⏭️ ഒഴിവാക്കി അടുത്തത്</button>
        <button class="outline-btn btn-block" onclick="FeeShared._remindStop()">⏹️ നിർത്തുക</button>
        <div class="muted" style="font-size:12px;margin-top:8px;">ബാക്കി: ${this._remindQueue.length} പേർ</div>
      </div>`;
    document.body.appendChild(overlay);
  },
  _remindSendCurrent(studentId){
    const s = U.studentById(studentId);
    const overlay = document.getElementById("remind-queue-overlay");
    if(overlay) overlay.remove();
    if(s && s.phone) U.sendWhatsApp(s.phone, U.feeDueReminderMessage(s));
    this._remindNext();
  },
  _remindStop(){
    this._remindQueue = [];
    const overlay = document.getElementById("remind-queue-overlay");
    if(overlay) overlay.remove();
    U.toast("നിർത്തി");
  },

  // Used when a student is tapped from the class dues list — loads them
  // straight into the fee-collection panel, same as typing their reg no.
  selectStudentForFee(studentId){
    const s = U.studentById(studentId);
    if(!s) return;
    this._selectedStudentId = studentId;
    const regInput = document.getElementById("fee-reg");
    if(regInput) regInput.value = s.reg;
    const infoBox = document.getElementById("fee-student-info");
    if(infoBox){
      infoBox.innerHTML = this.studentHtml(s);
      U.fixAccordionHeight(infoBox);
      infoBox.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  },

  lookupStudent(){
    const reg = (document.getElementById("fee-reg")||{}).value||"";
    const infoBox = document.getElementById("fee-student-info");
    if(!infoBox) return;
    if(!reg.trim()){ infoBox.innerHTML=""; this._selectedStudentId = null; return; }
    const s = U.studentByReg(reg.trim());
    if(!s){
      infoBox.innerHTML = `<p class="muted" style="margin-top:8px;">കുട്ടിയെ കണ്ടെത്താനായില്ല</p>`;
      this._selectedStudentId = null;
      return;
    }
    if(this.allowedClasses && !this.allowedClasses.includes(s.cls)){
      infoBox.innerHTML = `<p style="margin-top:8px; color:var(--rose); font-weight:600;">⚠️ ${CLASS_LABELS[s.cls]||s.cls} ക്ലാസ്സിലെ കുട്ടികളുടെ ഫീസ് നിങ്ങൾക്ക് കൈകാര്യം ചെയ്യാൻ അനുവാദമില്ല. നിങ്ങളുടെ ക്ലാസ്സിലെ കുട്ടിയുടെ Reg No നൽകുക.</p>`;
      this._selectedStudentId = null;
      return;
    }
    this._selectedStudentId = s.id;
    infoBox.innerHTML = this.studentHtml(s);
    U.fixAccordionHeight(infoBox);
  },

  studentHtml(s){
    const balance = Math.max(DB.data.fees.annual - s.paidTotal, 0);
    const payHist = (s.payments||[]).slice().reverse();
    const paidMonths = U.paidMonthsSet(s);

    let histHtml = "";
    if(payHist.length){
      histHtml = `<div class="divider"></div>
        <div class="card-title" style="font-size:14px; margin-bottom:8px;">📋 ഫീസ് ഹിസ്റ്ററി (Payment History)</div>`;
      payHist.forEach((p,revIdx)=>{
        const idx = (s.payments.length - 1) - revIdx;
        const monthsText = (p.months&&p.months.length) ? p.months.map(mk=>MONTH_LABELS[mk]||mk).join(", ") : "—";
        const msgParent = U.feeMessage(s, p.amount, p.date, p.months||[], 'parent');
        const msgGs = U.feeMessage(s, p.amount, p.date, p.months||[], 'gs');
        const msgMgr = U.feeMessage(s, p.amount, p.date, p.months||[], 'manager');
        histHtml += `<div class="card" style="margin-bottom:8px; background:#f8f5ef;">
          <div class="row" style="margin-bottom:4px;">
            <span style="font-weight:700;">₹${p.amount}</span>
            <span class="muted" style="font-size:12px;">${p.date}</span>
          </div>
          <div class="muted" style="font-size:12px; margin-bottom:4px;">മാസം: ${monthsText}</div>
          <div class="muted" style="font-size:12px; margin-bottom:8px;">വാങ്ങിയത്: <strong>${U.esc(p.collectedBy||'അറിയില്ല (പഴയ entry)')}</strong></div>
          <div class="btn-grid">
            <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msgParent)})'>📩 രക്ഷിതാവിന്</button>
            <button class="btn-wa" onclick='FeeShared.sendToSecretary(${JSON.stringify(msgGs)})'>📩 സെക്രട്ടറിക്ക്</button>
            <button class="btn-wa" onclick='FeeShared.sendToManager(${JSON.stringify(msgMgr)})'>📩 മാനേജർക്ക്</button>
            <button class="btn-small" onclick="FeeShared.startEditPayment('${s.id}',${idx})">✏️ തിരുത്ത്</button>
          </div>
          <div id="fee-edit-area-${s.id}-${idx}"></div>
        </div>`;
      });
    }

    const availableMonths = ACADEMIC_MONTHS.filter(m=>!paidMonths.has(m.key));
    const monthCheckboxHtml = availableMonths.length
      ? `<div class="month-grid">
          ${availableMonths.map(m=>`
            <label class="month-chip">
              <input type="checkbox" value="${m.key}" class="fee-month-cb">
              <span>${m.label}</span>
            </label>
          `).join("")}
        </div>`
      : `<p class="muted">✅ ഇതുവരെ ലഭ്യമായ എല്ലാ മാസത്തെയും ഫീസ് അടച്ചു കഴിഞ്ഞു.</p>`;

    return `
      <div class="divider"></div>
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <span class="muted">ആകെ അടച്ച തുക</span><strong>₹${s.paidTotal}</strong>
      </div>
      <div class="row">
        <span class="muted">ബാക്കി കുടിശ്ശിക</span><strong style="color:var(--rose);">₹${balance}</strong>
      </div>
      <div class="divider"></div>
      <div class="card-title" style="font-size:14px; margin-bottom:8px;">➕ പുതിയ ഫീസ് ചേർക്കുക</div>
      <div class="form-group">
        <label>ഏത് മാസത്തെ ഫീസ്? (ഒന്നോ അധികമോ)</label>
        ${monthCheckboxHtml}
      </div>
      <div class="form-group">
        <label>ഇപ്പോൾ അടക്കുന്ന തുക (₹)</label>
        <input type="number" id="fee-amount" placeholder="0">
      </div>
      <button class="primary-btn btn-block" onclick="FeeShared.collectFee('${s.id}')">ഫീസ് സ്വീകരിക്കുക</button>
      ${histHtml}
    `;
  },

  startEditPayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const p = s.payments[paymentIndex];
    const areaId = `fee-edit-area-${studentId}-${paymentIndex}`;
    const area = document.getElementById(areaId);
    if(!area) return;
    const paidMonths = U.paidMonthsSet(s, paymentIndex); // exclude this payment's own months
    area.innerHTML = `
      <div class="divider"></div>
      <div style="font-weight:700; margin-bottom:8px;">✏️ പേയ്മെന്റ് തിരുത്തുക</div>
      <div class="form-group">
        <label>തുക (₹)</label>
        <input type="number" id="edit-fee-amount-${studentId}-${paymentIndex}" value="${p.amount}">
      </div>
      <div class="form-group">
        <label>മാസങ്ങൾ</label>
        <div class="month-grid">
          ${ACADEMIC_MONTHS.map(m=>{
            const alreadyPaidElsewhere = paidMonths.has(m.key);
            const checked = (p.months||[]).includes(m.key);
            if(alreadyPaidElsewhere && !checked) return ""; // hide months paid by other entries
            return `<label class="month-chip">
              <input type="checkbox" value="${m.key}" class="edit-month-${studentId}-${paymentIndex}" ${checked?'checked':''}>
              <span>${m.label}</span>
            </label>`;
          }).join("")}
        </div>
      </div>
      <div class="btn-grid">
        <button class="primary-btn" onclick="FeeShared.savePaymentEdit('${studentId}',${paymentIndex})">✅ സേവ്</button>
        <button class="btn-danger" onclick="FeeShared.deletePayment('${studentId}',${paymentIndex})">🗑️ ഡിലീറ്റ്</button>
      </div>
    `;
  },

  savePaymentEdit(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const newAmount = parseFloat((document.getElementById(`edit-fee-amount-${studentId}-${paymentIndex}`)||{}).value||"0");
    if(!newAmount||newAmount<=0){ U.toast("ശരിയായ തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll(`.edit-month-${studentId}-${paymentIndex}`))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const oldAmount = s.payments[paymentIndex].amount;
    s.paidTotal = s.paidTotal - oldAmount + newAmount;
    s.payments[paymentIndex].amount = newAmount;
    s.payments[paymentIndex].months = months;
    DB.save();
    U.toast("പേയ്മെന്റ് തിരുത്തി");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  deletePayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const removed = s.payments.splice(paymentIndex,1)[0];
    s.paidTotal = Math.max(0, s.paidTotal - removed.amount);
    DB.save();
    U.toast("പേയ്മെന്റ് നീക്കം ചെയ്തു");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  collectFee(studentId){
    const amount = parseFloat((document.getElementById("fee-amount")||{}).value||"0");
    if(!amount||amount<=0){ U.toast("⚠️ തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll('.fee-month-cb'))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const s = U.studentById(studentId);
    if(!s){ U.toast("⚠️ വിദ്യാർത്ഥിയെ കണ്ടെത്തിയില്ല"); return; }
    if(!s.payments) s.payments = [];
    if(!s.paidTotal) s.paidTotal = 0;
    s.paidTotal += amount;
    const date = U.todayDisplay();
    s.payments.push({ amount, date, months, collectedBy: U.senderName() });
    // Save to localStorage
    try{
      DB.data._updatedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB.data));
    }catch(e){}
    // Push entire data to cloud (PATCH by index is unreliable if students array order changes)
    DB.pushToCloud();
    U.toast("₹" + amount + " ഫീസ് രേഖപ്പെടുത്തി ✅");
    const box = document.getElementById("fee-student-info");
    if(box){
      box.innerHTML = FeeShared.studentHtml(s);
      if(U.fixAccordionHeight) U.fixAccordionHeight(box);
    }
  },

  sendToSecretary(msg){
    let sec = DB.data.auth.staff.find(s=>s.role==='gs');
    if(!sec) sec = DB.data.auth.staff.find(s=>App.COMMITTEE_ROLES.includes(s.role));
    if(sec&&sec.phone){ U.sendWhatsApp(sec.phone, msg); }
    else U.toast("ജനറൽ സെക്രട്ടറിയുടെ നമ്പർ ലഭ്യമല്ല");
  },

  sendToManager(msg){
    const mgr = DB.data.auth.staff.find(s=>s.role==='manager');
    if(mgr&&mgr.phone){ U.sendWhatsApp(mgr.phone, msg); }
    else U.toast("മാനേജരുടെ നമ്പർ ലഭ്യമല്ല");
  }
};

document.addEventListener("DOMContentLoaded", () => App.init());

// Unregister ALL service workers so cached data never blocks fresh holiday/data sync
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
  // Also clear all caches
  if(window.caches){
    caches.keys().then(keys=>{ keys.forEach(k=>caches.delete(k)); });
  }
}

// ===========================================================
// AttendanceShared — common attendance UI for Teacher (own
// classes) and Sadhar (any class, fill-in for absent teachers)
// ===========================================================
const AttendanceShared = {
  _state: {}, // namespace -> {selClass, selDate}

  render(allowedClasses, forSadhar, namespace){
    if(!this._state[namespace]) this._state[namespace] = {};
    const state = this._state[namespace];
    let selClass = (state.selClass && allowedClasses.includes(state.selClass)) ? state.selClass : allowedClasses[0];
    state.selClass = selClass;
    const todayStr = U.todayStr();
    let selDate = state.selDate || todayStr;
    state.selDate = selDate;

    let html = `<div class="form-group">
      <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
      <select id="att-class-${namespace}" onchange="AttendanceShared.onChange('${namespace}', ${forSadhar})">
        ${allowedClasses.map(c=>{
          const shiftLabel = forSadhar ? ` — ഷിഫ്റ്റ് ${U.classShift(c)||'-'}` : '';
          return `<option value="${c}" ${selClass===c?'selected':''}>${CLASS_LABELS[c]}${shiftLabel}</option>`;
        }).join("")}
      </select>
    </div>`;

    html += `<div class="form-group">
      <label>തീയതി (ഹാജർ എടുക്കാൻ / കാണാൻ)</label>
      <input type="date" id="att-date-${namespace}" min="${ATTENDANCE_MIN_DATE}" max="${todayStr}" value="${selDate}" onchange="AttendanceShared.onChange('${namespace}', ${forSadhar})">
    </div>`;

    html += `<div id="att-body-${namespace}">${this.bodyHtml(selClass, selDate, forSadhar, namespace)}</div>`;
    return html;
  },

  onChange(namespace, forSadhar){
    const classSel = document.getElementById(`att-class-${namespace}`);
    const dateSel = document.getElementById(`att-date-${namespace}`);
    const state = this._state[namespace];
    state.selClass = classSel.value;
    state.selDate = dateSel.value;
    const body = document.getElementById(`att-body-${namespace}`);
    body.innerHTML = this.bodyHtml(state.selClass, state.selDate, forSadhar, namespace);
    U.fixAccordionHeight(body);
  },

  bodyHtml(cls, dateStr, forSadhar, namespace){
    const todayStr = U.todayStr();
    const isToday = (dateStr === todayStr);
    const shiftKey = U.classShift(cls);

    // Holiday blur only applies to TODAY — past/future dates are always editable.
    // Previously, an active holiday with no date check caused past-date student
    // buttons to be disabled, making it impossible to mark old attendance.
    let effectiveHoliday = null;
    if(isToday){
      const holiday = U.shiftHoliday(shiftKey);
      const clsHoliday = DB.data.holidays["cls_"+cls];
      effectiveHoliday = holiday || (clsHoliday && clsHoliday.active ? clsHoliday : null);
    }

    let html = "";
    if(forSadhar){
      html += this.teacherRowHtml(cls, dateStr);
    }
    if(effectiveHoliday){
      html += `<div class="blur-box">
        <div class="blurred">${this.attendanceListHtml(cls, dateStr, true, forSadhar, namespace)}</div>
        <div class="blur-overlay">
          <div>
            <div style="font-size:18px; font-weight:800; color:var(--rose); margin-bottom:6px;">ഇന്ന് അവധിയാണ്!</div>
            <div style="font-size:13px; color:#7a3d35;">കാരണം: ${U.esc(effectiveHoliday.reason)}</div>
          </div>
        </div>
      </div>`;
    } else {
      // disabled=false always — past dates must be editable for correction
      html += this.attendanceListHtml(cls, dateStr, false, forSadhar, namespace);
    }
    return html;
  },

  // For Sadhar mode: show the class's assigned teacher(s) with their own present/absent toggle,
  // so taking children's attendance doesn't wrongly mark an absent teacher as present.
  teacherRowHtml(cls, dateStr){
    const staff = DB.data.auth.staff;
    if(!staff || !Array.isArray(staff)) return `<div class="card" style="background:#fff7e6;"><p class="muted">ജീവനക്കാരുടെ data ലോഡ് ആകുന്നു...</p></div>`;
    const teachers = staff.filter(t=>t.role==='teacher' && (t.classes||[]).includes(cls));
    if(!teachers.length){
      return `<div class="card" style="background:#fff7e6;"><p class="muted">ഈ ക്ലാസ്സിന് നിയോഗിക്കപ്പെട്ട അധ്യാപകൻ ഇല്ല.</p></div>`;
    }
    const shiftKey = U.classShift(cls);
    const att = DB.data.attendance[dateStr] || {};
    let html = `<div class="card" style="background:#fff7e6;">
      <div class="card-title" style="font-size:14px;">👨‍🏫 ക്ലാസ്സ് അധ്യാപകന്റെ ഹാജർ (ഷിഫ്റ്റ് ${shiftKey||'-'})</div>`;
    teachers.forEach(t=>{
      const status = att[U.staffAttKey(t.id, shiftKey)] || (U.teacherTookAttendance(t, shiftKey, dateStr) ? 'present' : undefined);
      html += `<div class="row" style="padding:6px 0;">
        <div style="display:flex; align-items:center; gap:8px; flex:1;">
          ${U.photoOrInitial(t.photo, t.name)}
          <span style="font-size:13.5px;">${U.esc(t.name)}</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-small" id="btn-tpresent-${t.id}" style="${status==='present'?'background:var(--moss);color:#fff;border-color:var(--moss);':''}" onclick="AttendanceShared.markTeacher('${t.id}','present','${dateStr}',${shiftKey})">Present</button>
          <button class="btn-small" id="btn-tabsent-${t.id}" style="${status==='absent'?'background:var(--rose);color:#fff;border-color:var(--rose);':''}" onclick="AttendanceShared.markTeacher('${t.id}','absent','${dateStr}',${shiftKey})">Absent</button>
        </div>
      </div>`;
    });
    html += `</div>`;
    return html;
  },

  markTeacher(teacherId, status, dateStr, shiftKey){
    if(!DB.data.attendance[dateStr]) DB.data.attendance[dateStr] = {};
    DB.data.attendance[dateStr][U.staffAttKey(teacherId, shiftKey)] = status;
    try{
      DB.data._updatedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB.data));
    }catch(e){}
    DB.pushAttendanceDate(dateStr);
    const pBtn = document.getElementById(`btn-tpresent-${teacherId}`);
    const aBtn = document.getElementById(`btn-tabsent-${teacherId}`);
    if(pBtn && aBtn){
      if(status==='present'){
        pBtn.style.background="var(--moss)"; pBtn.style.color="#fff"; pBtn.style.borderColor="var(--moss)";
        aBtn.style.background=""; aBtn.style.color=""; aBtn.style.borderColor="";
      } else {
        aBtn.style.background="var(--rose)"; aBtn.style.color="#fff"; aBtn.style.borderColor="var(--rose)";
        pBtn.style.background=""; pBtn.style.color=""; pBtn.style.borderColor="";
      }
    }
    U.toast("അധ്യാപകന്റെ ഹാജർ രേഖപ്പെടുത്തി");
  },

  confirmSaved(cls, dateStr){
    const students = U.studentsByClass(cls);
    const att = DB.data.attendance[dateStr] || {};
    const unmarked = students.filter(s => !att[s.id]);
    DB.save(); // explicit save + push to cloud right now, no waiting
    if(unmarked.length > 0){
      U.toast(`⚠️ ${unmarked.length} കുട്ടികളുടെ ഹാജർ ഇതുവരെ രേഖപ്പെടുത്തിയിട്ടില്ല — അവരെ കൂടി mark ചെയ്യുക`);
    } else {
      U.toast("✅ ഹാജർ പൂർണ്ണമായി സേവ് ആയി!");
    }
  },

  attendanceListHtml(cls, dateStr, disabled, forSadhar, namespace){
    const students = U.studentsByClass(cls);
    const att = DB.data.attendance[dateStr] || {};
    const isToday = (dateStr === U.todayStr());
    const displayDate = U.displayDateFromStr(dateStr);

    let html = `<div class="card">
      <div class="card-title">${CLASS_LABELS[cls]} — ${displayDate}</div>`;

    students.forEach(s=>{
      const status = att[s.id];
      html += `<div class="row" style="padding:6px 0;">
        <div style="display:flex; align-items:center; gap:8px; flex:1;">
          ${U.photoOrInitial(s.photo, s.name)}
          <span style="font-size:13.5px;">${U.esc(s.name)} <span class="muted" style="font-size:11.5px;">(Reg No: ${U.esc(s.reg)})</span></span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-small" id="btn-present-${s.id}" style="${status==='present'?'background:var(--moss);color:#fff;border-color:var(--moss);':''}" ${disabled?'disabled':''} onclick="AttendanceShared.markAttendance('${s.id}','present','${cls}','${dateStr}',${forSadhar},'${namespace}')">Present</button>
          <button class="btn-small" id="btn-absent-${s.id}" style="${status==='absent'?'background:var(--rose);color:#fff;border-color:var(--rose);':''}" ${disabled?'disabled':''} onclick="AttendanceShared.markAttendance('${s.id}','absent','${cls}','${dateStr}',${forSadhar},'${namespace}')">Absent</button>
        </div>
      </div>
      <div id="wa-absent-${s.id}"></div>`;
    });
    if(students.length===0) html += `<p class="muted">ഈ ക്ലാസ്സിൽ കുട്ടികൾ ഇല്ല</p>`;
    if(!isToday) html += `<p class="muted" style="margin-top:8px;">⚠️ പഴയ തീയതിയിലെ ഹാജർ തിരുത്തുകയോ ചേർക്കുകയോ ചെയ്യുന്നു.</p>`;
    if(forSadhar) html += `<p class="muted" style="margin-top:8px;">ℹ️ സദർ നേരിട്ട് ഹാജർ നൽകുന്നു — ക്ലാസ്സ് അധ്യാപകൻ ഈ ഷിഫ്റ്റിന് ഓട്ടോമാറ്റിക് ആയി "അസാന്നിധ്യം" ആയി രേഖപ്പെടും (മുകളിലെ ടോഗിൾ ഉപയോഗിച്ച് തിരുത്താം).</p>`;

    // Explicit "save" confirmation. Each Present/Absent tap already saves
    // instantly behind the scenes — but there was no visible confirmation,
    // which left people unsure whether it had actually been saved. This
    // button doesn't change how saving works; it just gives a clear,
    // reassuring "yes, this is saved" moment, and also makes sure a sync
    // to the cloud is pushed right away rather than waiting.
    if(students.length > 0){
      html += `<button class="primary-btn btn-block" style="margin-top:12px;" onclick="AttendanceShared.confirmSaved('${cls}','${dateStr}')">✅ ഹാജർ സേവ് ചെയ്യുക</button>`;
    }

    // Class group WhatsApp summary button
    if(isToday && students.length > 0){
      html += `<div style="margin-top:10px;">
        <button class="btn-wa" onclick="AttendanceShared.sendGroupSummary('${cls}','${dateStr}')">
          📊 ഹാജർ summary share ചെയ്യുക
        </button>
      </div>`;
    }

    html += `</div>`;
    return html;
  },

  sendGroupSummary(cls, dateStr){
    const students = U.studentsByClass(cls);
    const att = DB.data.attendance[dateStr] || {};
    const presentCount = students.filter(s => att[s.id] === 'present').length;
    const absentCount = students.filter(s => att[s.id] === 'absent').length;
    const displayDate = U.displayDateFromStr(dateStr);
    const clsLabel = CLASS_LABELS[cls] || cls;

    // One single continuous list — exactly as many numbers as students,
    // each with its own status icon. A separator line right after the
    // last student makes it visually clear the list has ended, instead
    // of an extra stray number appearing after the real students.
    let msg = `📚 *മമ്പഉൽ ഉലൂം മദ്റസ*\n`;
    msg += `*${clsLabel} — ഹാജർ വിവരം*\n`;
    msg += `📅 ${displayDate}\n`;
    msg += `━━━━━━━━━━━━━━━\n`;
    students.forEach((s,i) => {
      const status = att[s.id];
      const label = status === 'present' ? '✅ Present' : status === 'absent' ? '❌ Absent' : '⚠️ Not marked';
      msg += `${i+1}. ${s.name} — ${label}\n`;
    });
    msg += `━━━━━━━━━━━━━━━\n`;
    msg += `Present: ${presentCount} | Absent: ${absentCount}\n\n`;
    msg += `- ${U.senderName()}`;

    // Prefer the class's configured WhatsApp group link — this opens
    // directly into that specific group's chat instead of making the
    // user pick a chat from a generic share list every time.
    const groupLink = DB.data.classGroups && DB.data.classGroups[cls] && DB.data.classGroups[cls].groupLink;
    if(groupLink){
      U.sendWhatsAppGroup(groupLink, msg);
      return;
    }

    // No group link configured for this class — fall back to the native
    // share sheet (requires manually picking a chat) and nudge the user
    // to set up the group link once, in Sadhar Profile, for a one-tap send.
    U.toast("ഈ ക്ലാസ്സിന്റെ WhatsApp ഗ്രൂപ്പ് ലിങ്ക് ഇതുവരെ ചേർത്തിട്ടില്ല — പ്രൊഫൈലിൽ ചേർത്താൽ ഇനി നേരെ ഗ്രൂപ്പിലേക്ക് അയക്കാം");
    if(navigator.share){
      navigator.share({ text: msg })
        .then(()=>{ U.toast("Share ചെയ്തു ✓"); })
        .catch(e=>{ if(e.name !== 'AbortError') U.toast("Share cancel ചെയ്തു"); });
    } else {
      // Fallback for desktop/unsupported: copy to clipboard
      navigator.clipboard.writeText(msg).then(()=>{
        U.toast("Summary copied! WhatsApp-ൽ paste ചെയ്യുക ✓");
      }).catch(()=>{
        // Last resort: show in a textarea for manual copy
        const ta = document.createElement('textarea');
        ta.value = msg;
        ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:60vh;z-index:9999;padding:12px;font-size:13px;border-radius:8px;border:2px solid var(--primary);';
        document.body.appendChild(ta);
        ta.select();
        U.toast("Text select ചെയ്ത് copy ചെയ്യുക");
        setTimeout(()=>{ ta.remove(); }, 15000);
      });
    }
  },

  markAttendance(studentId, status, cls, dateStr, forSadhar, namespace){
    if(!DB.data.attendance[dateStr]) DB.data.attendance[dateStr] = {};
    DB.data.attendance[dateStr][studentId] = status;

    // Auto-mark teacher present for THIS SHIFT (only for today's date, and only when a teacher takes their own attendance)
    if(!forSadhar && dateStr === U.todayStr()){
      const shiftKeyForCls = U.classShift(cls);
      // Don't trust App.user.id blindly — it was captured once at login
      // time and stored in the session. If it ever drifts from what's
      // CURRENTLY authoritative in DB.data.auth.staff (this can happen
      // for a teacher added very recently, before every device's sync has
      // settled), writes under the stale id land on a "phantom" key that
      // nothing displays — while Sadhar's manual toggle always looks up
      // the live id fresh, so it works immediately and makes the teacher
      // path look broken by comparison. Re-confirm against the live staff
      // list first, falling back to matching by the class actually being
      // marked if the cached id no longer matches anything.
      let liveTeacherId = null;
      if(App.user && App.user.id && (DB.data.auth.staff||[]).some(s=>s.id===App.user.id)){
        liveTeacherId = App.user.id;
      } else {
        const byClass = (DB.data.auth.staff||[]).find(s=>s.role==='teacher' && (s.classes||[]).includes(cls));
        if(byClass) liveTeacherId = byClass.id;
      }
      if(liveTeacherId && shiftKeyForCls){
        DB.data.attendance[dateStr][U.staffAttKey(liveTeacherId, shiftKeyForCls)] = "present";
      }
    }
    // When SADHAR is the one taking a class's attendance, that itself
    // means the assigned teacher(s) weren't there to take it for THIS
    // SHIFT — so mark them absent automatically for that shift only, no
    // separate manual step needed. (Sadhar can still flip a teacher to
    // "present" via the toggle above this list if needed.) A teacher's
    // status in a different shift on the same day is untouched.
    if(forSadhar && dateStr === U.todayStr()){
      const shiftKeyForCls = U.classShift(cls);
      if(shiftKeyForCls){
        const classTeachers = (DB.data.auth.staff||[]).filter(t=>t.role==='teacher' && (t.classes||[]).includes(cls));
        classTeachers.forEach(t=>{
          const key = U.staffAttKey(t.id, shiftKeyForCls);
          if(DB.data.attendance[dateStr][key] === undefined){
            DB.data.attendance[dateStr][key] = "absent";
          }
        });
      }
    }
    // Save: localStorage + targeted PATCH for just this date
    // Full cloudPut from one teacher would overwrite other teachers' entries
    try{
      DB.data._updatedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB.data));
    }catch(e){}
    DB.pushAttendanceDate(dateStr);

    if(status === 'absent'){
      const s = U.studentById(studentId);
      const senderName = U.senderName();
      const dateDisplay = U.displayDateFromStr(dateStr);
      const msg = `ബഹുമാനപ്പെട്ട രക്ഷിതാവേ, താങ്കളുടെ ${U.childWord(s)} ${s.name} (Reg No: ${s.reg}, ${CLASS_LABELS[s.cls]}) ${dateDisplay}-ന് മദ്റസയിൽ ഹാജരായിട്ടില്ല. വിവരം അറിയിക്കുന്നു. - ${senderName}, മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
      document.getElementById("wa-absent-"+studentId).innerHTML =
        `<div style="margin:4px 0 8px;"><button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msg)})'>📩 രക്ഷിതാവിന് WhatsApp അയക്കുക</button></div>`;
    } else {
      const waBox = document.getElementById("wa-absent-"+studentId);
      if(waBox) waBox.innerHTML = "";
    }

    const presentBtn = document.getElementById("btn-present-"+studentId);
    const absentBtn = document.getElementById("btn-absent-"+studentId);
    if(presentBtn && absentBtn){
      if(status === 'present'){
        presentBtn.style.background = "var(--moss)"; presentBtn.style.color = "#fff"; presentBtn.style.borderColor = "var(--moss)";
        absentBtn.style.background = ""; absentBtn.style.color = ""; absentBtn.style.borderColor = "";
      } else {
        absentBtn.style.background = "var(--rose)"; absentBtn.style.color = "#fff"; absentBtn.style.borderColor = "var(--rose)";
        presentBtn.style.background = ""; presentBtn.style.color = ""; presentBtn.style.borderColor = "";
      }
    }

    if(forSadhar){
      const body = document.getElementById(`att-body-${namespace}`);
      if(body) U.fixAccordionHeight(body);
    }
  }
};

</script>
</body>
</html>
