      html += `<p class="muted" style="font-size:12px; margin-top:10px;">ഈ QR കോഡ് / GPay നമ്പർ ഉപയോഗിച്ച് ഫീസ് അടച്ച ശേഷം, മദ്റസയിൽ വന്ന് ക്ലാസ്സ് അധ്യാപകനെ വിവരം അറിയിക്കുക. ഫീസ് സ്റ്റാറ്റസ് manually അപ്ഡേറ്റ് ചെയ്യപ്പെടും.</p>`;
      html += `</div>`;
    }

    html += `<button class="primary-btn" style="margin-top:10px;" onclick="Parent.downloadFeeReport()">ഫീസ് റിപ്പോർട്ട് ഡൗൺലോഡ് ചെയ്യുക (PDF)</button>`;
    return html;
  },

  downloadFeeReport(){
    const s = this.me();
    const fees = DB.data.fees;
    const balance = Math.max(fees.annual - s.paidTotal, 0);
    // Build a simple printable HTML and trigger print-to-pdf
    const w = window.open("", "_blank");
    w.document.write(`
      <html><head><title>ഫീസ് റിപ്പോർട്ട് - ${s.name}</title>
      <style>
        body{font-family:sans-serif; padding:24px;}
        h2{margin-bottom:4px;} table{width:100%; border-collapse:collapse; margin-top:16px;}
        td,th{border:1px solid #ccc; padding:8px; text-align:left;}
      </style></head><body>
      <h2>മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട് (Reg: 6682)</h2>
      <p>ഫീസ് റിപ്പോർട്ട് — ${U.todayDisplay()}</p>
      <p><strong>കുട്ടിയുടെ പേര്:</strong> ${U.esc(s.name)}<br>
      <strong>ക്ലാസ്സ്:</strong> ${CLASS_LABELS[s.cls]}<br>
      <strong>രജിസ്റ്റർ നമ്പർ:</strong> ${s.reg}</p>
      <p><strong>ആകെ ഫീസ്:</strong> ₹${fees.annual}<br>
      <strong>അടച്ച തുക:</strong> ₹${s.paidTotal}<br>
      <strong>ബാക്കി:</strong> ₹${balance}</p>
      <table><tr><th>തീയതി</th><th>തുക</th></tr>
      ${s.payments.map(p=>`<tr><td>${p.date}</td><td>₹${p.amount}</td></tr>`).join("")}
      </table>
      <scri` + `pt>window.print();</scri` + `pt>
      </body></html>
    `);
    w.document.close();
  },

  // ---------- Results ----------
  renderResults(){
    const s = this.me();
    let html = `<h2 style="margin-bottom:14px;">സമയവിവരപ്പട്ടികയും റിസൾട്ടും</h2>`;

    // timetable — hidden from the student's own view once every exam
    // date has passed (so they aren't left staring at a finished exam's
    // schedule indefinitely). The data itself is never deleted — Sadhar
    // can still see the full timetable, including past dates, from the
    // Sadhar panel's own "പരീക്ഷാ ടൈംടേബിൾ" section at any time.
    const tt = DB.data.timetables[s.cls];
    if(tt && tt.rows && tt.rows.length && !U.isExamOver(tt)){
      html += `<div class="card">
        <div class="card-title">സമയവിവരപ്പട്ടിക (Timetable)</div>
        ${U.timetableTableHtml(tt)}
        <button class="primary-btn btn-block" style="margin-top:10px;" onclick="Parent.downloadHallTicket()">🎫 ഹോൾ ടിക്കറ്റ് ഡൗൺലോഡ് ചെയ്യുക</button>
      </div>`;
    }

    // results
    const exams = Object.keys(DB.data.results);
    if(exams.length===0){
      html += `<div class="empty-state"><div class="emoji">📋</div>റിസൾട്ടുകൾ ഇതുവരെ പ്രസിദ്ധീകരിച്ചിട്ടില്ല</div>`;
      return html;
    }

    exams.forEach(exam=>{
      const classResults = DB.data.results[exam][s.cls];
      if(!classResults) return;
      const myResult = classResults[s.reg];
      html += `<div class="card">
        <div class="card-title">${U.esc(exam)}</div>`;
      if(myResult){
        html += `<table><tr><th>വിഷയം</th><th>മാർക്ക്</th></tr>
          ${Object.entries(myResult.subjects).map(([sub,mark])=>`<tr><td>${U.esc(sub)}</td><td>${mark}</td></tr>`).join("")}
          <tr><td><strong>ആകെ</strong></td><td><strong>${myResult.total}</strong></td></tr>
        </table>
        <div class="row" style="margin-top:8px;"><span class="muted">റാങ്ക്</span><span class="pill green">${myResult.rank}</span></div>`;
      } else {
        html += `<p class="muted">ഈ പരീക്ഷയിൽ കുട്ടിയുടെ മാർക്ക് ഇതുവരെ ചേർത്തിട്ടില്ല</p>`;
      }

      // class ranking
      html += `<div class="divider"></div>
        <div class="card-title" style="font-size:13px;">ക്ലാസ്സ് റാങ്ക് ലിസ്റ്റ്</div>
        <table><tr><th>റാങ്ക്</th><th>പേര്</th><th>ആകെ</th></tr>`;
      const sorted = Object.entries(classResults).sort((a,b)=>a[1].rank-b[1].rank);
      sorted.forEach(([reg, r])=>{
        const student = U.studentByReg(reg);
        const isMe = reg === s.reg;
        html += `<tr style="${isMe?'background:#e7f0ea;':''}"><td>${r.rank}</td><td>${student?U.esc(student.name):reg}</td><td>${r.total}</td></tr>`;
      });
      html += `</table></div>`;
    });

    return html;
  },

  // Generates a personalized exam hall ticket (admit card) as an image —
  // student photo, name, register number, class, and the class's full
  // exam timetable — and triggers a download. Shared with Sadhar, who can
  // download the same ticket on behalf of a student (see U.downloadHallTicketFor).
  downloadHallTicket(){
    const s = this.me();
    if(!s) return;
    U.downloadHallTicketFor(s);
  },

  // ---------- Staff directory ----------
  renderStaff(){
    const s = this.me();
    let html = `<h2 style="margin-bottom:14px;">മദ്റസ ജീവനക്കാർ (Staff Directory)</h2>`;

    const classTeacher = [...DB.data.auth.staff].reverse().find(t=>t.role==='teacher' && t.classes && t.classes.includes(s.cls)); // safety net: prefer the most recently assigned teacher if a class is (still) listed under more than one
    if(classTeacher){
      html += `<div class="card">
        <div class="card-title">ക്ലാസ്സ് അധ്യാപകൻ</div>

          ${U.photoOrInitial(classTeacher.photo, classTeacher.name)}
          <div style="flex:1; margin-left:10px;">
            <div style="font-weight:700;">${U.esc(classTeacher.name)}</div>
            <div class="muted">${U.esc(classTeacher.phone)}</div>
          </div>
          <a class="link-btn" href="tel:${classTeacher.phone}">വിളിക്കുക</a>
        </div>
      </div>`;

      <div class="row">
        ${U.photoOrInitial(sadhar.photo || "", sadharName)}
        <div style="flex:1; margin-left:10px;">
          <div style="font-weight:700;">${U.esc(sadharName)}</div>
          <div class="muted">മദ്റസ സദർ</div>
          ${sadharPhone ? `<div class="muted">${U.esc(sadharPhone)}</div>` : `<div class="muted" style="color:#c9a84c;">📝 സദർ ഫോൺ നമ്പർ ഇനി ചേർക്കേണ്ടതുണ്ട്</div>`}
        </div>
        ${sadharPhone ? `<a class="link-btn" href="tel:${sadharPhone}">വിളിക്കുക</a>` : ""}

    // committee
    const committee = DB.data.auth.staff.filter(t=>App.COMMITTEE_ROLES.includes(t.role));
    if(committee.length){
      html += `<div class="section-title">കമ്മിറ്റി</div>`;

        html += `<div class="card">
          <div class="row">
            ${U.photoOrInitial(c.photo, c.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(c.name)}</div>
              <div class="muted">${App.ROLE_LABELS[c.role] || 'കമ്മിറ്റി'}</div>
              <div class="muted">${U.esc(c.phone)}</div>
            </div>
            <a class="link-btn" href="tel:${c.phone}">വിളിക്കുക</a>
          </div>
        </div>`;
      });
    }

    if(!classTeacher && committee.length===0){
      html += `<div class="empty-state"><div class="emoji">👨‍🏫</div>ജീവനക്കാരെ ഇതുവരെ ചേർത്തിട്ടില്ല</div>`;
    }

    return html;
  },

  // ---------- Profile ----------
  renderProfile(){
    const s = this.me();
    let html = `<h2 style="margin-bottom:14px;">പ്രൊഫൈൽ (Profile)</h2>`;
    html += `<div class="card">
      <div class="form-group"><label>കുട്ടിയുടെ പേര് (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${U.esc(s.name)}" disabled></div>
      <div class="form-group"><label>ക്ലാസ്സ് (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${CLASS_LABELS[s.cls]}" disabled></div>
      <div class="form-group"><label>രജിസ്റ്റർ നമ്പർ (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${s.reg}" disabled></div>
      <div class="form-group"><label>ജനനത്തീയതി (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${U.esc(s.dob)}" disabled></div>
      <div class="divider"></div>
      <div class="form-group"><label>രക്ഷിതാവിന്റെ പേര് (തിരുത്താം)</label><input type="text" id="p-parent" value="${U.esc(s.parentName)}"></div>
      <div class="form-group"><label>ഫോൺ നമ്പർ (തിരുത്താം)</label><input type="text" id="p-phone" value="${U.esc(s.phone)}"></div>
      <div class="form-group"><label>കുട്ടിയുടെ ഫോട്ടോ (തിരുത്താം)</label><input type="file" accept="image/*" id="p-photo" onclick="U.armPhotoRecovery('parent-profile')"></div>
      <button class="primary-btn" onclick="Parent.saveProfile()">സേവ് ചെയ്യുക</button>
    </div>`;

    html += `<div class="card">
      <div class="card-title">🔔 അറിയിപ്പുകൾ (Notifications)</div>
      <p class="muted" style="margin-bottom:8px;">സദർ പുതിയ അവധി/പൊതു അറിയിപ്പ്/പരീക്ഷാ സമയവിവരപ്പട്ടിക നൽകുമ്പോൾ ഈ ഫോണിൽ ഒരു notification കാണിക്കും. ഇത് ആപ്പ് തുറന്നിരിക്കുമ്പോഴോ recently ഉപയോഗിച്ചപ്പോഴോ മാത്രമേ ഉറപ്പായും വരൂ — ഫോൺ പൂർണ്ണമായി അടച്ചിട്ടാൽ വരണമെന്നില്ല.</p>
      <button class="secondary-btn btn-block" onclick="U.enableNotifications()">🔔 Notification ഓൺ ആക്കുക</button>
    </div>`;

    html += `<div class="card">
      <div class="card-title">പാസ്‌വേർഡ് മാറ്റുക</div>
      <div class="form-group"><label>പുതിയ പാസ്‌വേർഡ്</label><input type="text" id="p-newpass" placeholder="പുതിയ പാസ്‌വേർഡ് ടൈപ്പ് ചെയ്യുക"></div>
      <button class="secondary-btn" onclick="Parent.changePassword()">പാസ്‌വേർഡ് സേവ് ചെയ്യുക</button>
    </div>`;

    return html;
  },

  saveProfile(){
    const s = this.me();
    s.parentName = document.getElementById("p-parent").value.trim();
    s.phone = document.getElementById("p-phone").value.trim();
    const fileInput = document.getElementById("p-photo");
    const finish = ()=>{
      DB.save();
      U.toast("പ്രൊഫൈൽ സേവ് ചെയ്തു");
      U.clearPhotoRecovery();
      App.refresh();
      App.setTopbarRole();
    };
    if(fileInput.files[0]){
      U.readPhotoFile(fileInput.files[0], (data64)=>{ s.photo=data64; DB.pushPhoto(s.id, data64); finish(); });
    } else finish();
  },

  changePassword(){
    const pass = document.getElementById("p-newpass").value.trim();
    if(!pass){ U.toast("പാസ്‌വേർഡ് ടൈപ്പ് ചെയ്യുക"); return; }
    const s = this.me();
    s.parentPassword = pass;
    DB.save();
    U.toast("പാസ്‌വേർഡ് മാറ്റി");
  }
};

// renderers_public.js — Public Result Page (No login required)
// ===========================================================
const Public = {

  currentTab: 'results',

  render(){
    let html = `<div class="btn-grid" style="margin-bottom:14px;">
      <button class="${this.currentTab==='results'?'primary-btn':'outline-btn'}" onclick="Public.switchTab('results')">📋 റിസൾട്ട്</button>
      <button class="${this.currentTab==='staff'?'primary-btn':'outline-btn'}" onclick="Public.switchTab('staff')">👨‍🏫 സ്റ്റാഫ് / കമ്മിറ്റി</button>
    </div>`;

    if(this.currentTab === 'staff'){
      html += this.renderStaffDirectory();
      return html;
    }

    html += `<h2 style="margin-bottom:14px;">റിസൾട്ട് കാണുക (View Results)</h2>`;
    const exams = Object.keys(DB.data.results);
    if(exams.length===0){
      return html + `<div class="empty-state"><div class="emoji">📋</div>റിസൾട്ടുകൾ ഇതുവരെ പ്രസിദ്ധീകരിച്ചിട്ടില്ല</div>`;
    }

    html += `<div class="form-group">
      <label>പരീക്ഷ തിരഞ്ഞെടുക്കുക</label>
      <select id="pub-exam" onchange="Public.refresh()">
        ${exams.map(e=>`<option value="${U.esc(e)}">${U.esc(e)}</option>`).join("")}
      </select>
    </div>`;

    const selExam = document.getElementById("pub-exam") ? document.getElementById("pub-exam").value : exams[0];
    const examData = DB.data.results[selExam] || {};
    const classesWithResults = Object.keys(examData).filter(c=>CLASS_LIST.includes(c));

    html += `<div class="form-group">
      <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
      <select id="pub-class" onchange="Public.refresh()">
        ${classesWithResults.map(c=>`<option value="${c}">${CLASS_LABELS[c]}</option>`).join("")}
      </select>
    </div>`;

    const selClass = document.getElementById("pub-class") ? document.getElementById("pub-class").value : classesWithResults[0];
    html += `<div id="pub-result-area">${this.resultArea(selExam, selClass)}</div>`;
    html += `<button class="primary-btn" style="margin-top:10px;" onclick="window.print()">പ്രിന്റ് / PDF ഡൗൺലോഡ്</button>`;
    return html;
  },

  refresh(){
    const exam = document.getElementById("pub-exam").value;
    document.getElementById("public-container").innerHTML = this.render();
  },

  resultArea(exam, cls){
    if(!exam || !cls) return `<p class="muted">തിരഞ്ഞെടുക്കുക</p>`;
    const classResults = (DB.data.results[exam] || {})[cls];
    if(!classResults) return `<p class="muted">ഈ ക്ലാസ്സിന് റിസൾട്ട് ലഭ്യമല്ല</p>`;

    const sorted = Object.entries(classResults).sort((a,b)=>a[1].rank-b[1].rank);

    let html = `<div class="section-title">മികച്ച വിജയം നേടിയവർ (Toppers)</div>`;
    sorted.slice(0,3).forEach(([reg,r])=>{
      const student = U.studentByReg(reg);
      if(!student) return;
      html += `<div class="topper-card ${r.rank===1?'rank1':''}">
        <div class="rank-badge">റാങ്ക് ${r.rank}</div>
        ${student.photo ? `<img src="${student.photo}" class="topper-photo">` : `<div class="topper-photo">${U.esc(U.initials(student.name))}</div>`}
        <div style="font-weight:700; font-size:15px;">${U.esc(student.name)}</div>
        <div class="muted">${CLASS_LABELS[student.cls]} • Reg No: ${student.reg}</div>
        <div style="margin-top:6px; font-weight:700; color:var(--moss-deep);">ആകെ മാർക്ക്: ${r.total}</div>
      </div>`;
    });

    html += `<div class="section-title">മുഴുവൻ റാങ്ക് ലിസ്റ്റ്</div>
      <div class="card"><table><tr><th>റാങ്ക്</th><th>പേര്</th><th>ആകെ</th></tr>
      ${sorted.map(([reg,r])=>{
        const student = U.studentByReg(reg);
        return `<tr><td>${r.rank}</td><td>${student?U.esc(student.name):reg}</td><td>${r.total}</td></tr>`;
      }).join("")}
      </table></div>`;

    return html;
  },

  switchTab(tab){
    this.currentTab = tab;
    document.getElementById("public-container").innerHTML = this.render();
  },

  renderStaffDirectory(){
    let html = `<h2 style="margin-bottom:14px;">സ്റ്റാഫ് & കമ്മിറ്റി (Staff & Committee)</h2>`;

    // Committee first, in a sensible order
    const roleOrder = ["president","gs","joint-secretary","manager","committee"];
    const committee = DB.data.auth.staff
      .filter(s => App.COMMITTEE_ROLES.includes(s.role))
      .sort((a,b)=> roleOrder.indexOf(a.role) - roleOrder.indexOf(b.role));

    if(committee.length){
      html += `<div class="section-title">കമ്മിറ്റി / ഭാരവാഹികൾ</div>`;
      committee.forEach(c=>{
        html += `<div class="card">
          <div class="row">
            ${U.photoOrInitial(c.photo, c.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(c.name)}</div>
              <div class="muted">${App.ROLE_LABELS[c.role] || 'കമ്മിറ്റി'}</div>
              <div class="muted">${U.esc(c.phone)}</div>
            </div>
            ${c.phone ? `<a class="link-btn" href="tel:${c.phone}">വിളിക്കുക</a>` : ""}
          </div>
        </div>`;
      });
    }

    // Sadhar
    html += `<div class="section-title">സദർ</div>`;
    html += `<div class="card">
      <div class="row">
        ${U.photoOrInitial(DB.data.auth.sadhar.photo || "", DB.data.auth.sadhar.name || "സദർ")}
        <div style="flex:1; margin-left:10px;">
          <div style="font-weight:700;">${U.esc(DB.data.auth.sadhar.name || "സദർ")}</div>
          <div class="muted">സദർ (Sadhar)</div>
          ${DB.data.auth.sadhar.phone ? `<div class="muted">${U.esc(DB.data.auth.sadhar.phone)}</div>` : ""}
        </div>
        ${DB.data.auth.sadhar.phone ? `<a class="link-btn" href="tel:${DB.data.auth.sadhar.phone}">വിളിക്കുക</a>` : ""}
      </div>
    </div>`;

    // Teachers
    const teachers = DB.data.auth.staff.filter(s=>s.role==='teacher');
    if(teachers.length){
      html += `<div class="section-title">അധ്യാപകർ (Teachers)</div>`;
      teachers.forEach(t=>{
        html += `<div class="card">
          <div class="row">
            ${U.photoOrInitial(t.photo, t.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(t.name)}</div>
              <div class="muted">${t.classes && t.classes.length ? t.classes.map(c=>CLASS_LABELS[c]).join(", ") : "അധ്യാപകൻ"}</div>
              <div class="muted">${U.esc(t.phone)}</div>
            </div>
            ${t.phone ? `<a class="link-btn" href="tel:${t.phone}">വിളിക്കുക</a>` : ""}
          </div>
        </div>`;
      });
    }

    if(committee.length===0 && teachers.length===0){
      html += `<div class="empty-state"><div class="emoji">👨‍🏫</div>ഇതുവരെ ജീവനക്കാരെ ചേർത്തിട്ടില്ല</div>`;
    }

    return html;
  }
};

// app.js — Core application logic

const App = {
  user: null, // {type:'sadhar'|'teacher'|'president'|'gs'|'joint-secretary'|'manager'|'committee'|'parent', ...}
  currentTab: null,

  COMMITTEE_ROLES: ["president","gs","joint-secretary","manager","committee"],

    president: "പ്രസിഡണ്ട് (President)",
    gs: "ജനറൽ സെക്രട്ടറി (General Secretary)",
    "joint-secretary": "ജോയിന്റ് സെക്രട്ടറി (Joint Secretary)",
    manager: "മാനേജർ (Manager)",

  // =====================================================================
  // PERMANENT FIX for "announcement doesn't show unless I force-close and
  // reopen the app": most people don't actually close the app — they just
  // switch to another app/tab and come back later, or simply leave the
  // page open. The JS session keeps running the whole time, so it never
  // re-checks the cloud unless we explicitly tell it to. This sets up:
  //   1) A re-sync the moment the tab/app becomes visible again (covers
  //      "switched away and came back" — the most common real case).
  //   2) A safety-net re-sync every 2 minutes while the app stays open and
  //      visible (covers "left the page open the whole time").
  // Both run silently in the background; if new data is found, the screen
  // just quietly refreshes — no popups, no disruption.
  // =====================================================================
  _autoSyncStarted: false,
  startAutoSync(){
    if(this._autoSyncStarted) return;
    this._autoSyncStarted = true;

    const quietSync = (safeToRerender) => {
      if(!this.user) return;
      if(document.visibilityState !== "visible") return;
      DB.syncFromCloud((updated)=>{
        if(!updated) return;
        // Check for anything notification-worthy (new holiday, today's
        // announcement, updated exam timetable) regardless of which tab
        // the parent is currently on — not just on the home tab.
        if(this.user.type === "parent" && this.user.studentId){
          const s = U.studentById(this.user.studentId);
          if(s) U.checkNewNotificationsForStudent(s);
        }
        if(safeToRerender && !U.isPhotoPickInProgress() && !U.isFormInteractionInProgress()){
          // Safe to refresh here: the user just switched back INTO the
          // app (reopened it, returned from another app/tab) — they
          // weren't mid-typing or mid-toggle at this exact instant, so a
          // re-render can't blow away in-progress input. This is what
          // makes a Sadhar-side change (e.g. a class's teacher being
          // swapped) actually show up promptly instead of a student
          // staring at stale info until they happen to navigate away and
          // back or tap the 🔄 button themselves.
          //
          // EXCEPTION: if a photo picker was just armed (U.armPhotoRecovery
          // was called right before the OS gallery opened), this exact
          // visibilitychange is almost certainly the person returning
          // from picking a photo — NOT some unrelated app-switch. The
          // edit form they were on is only an inline HTML swap, not a
          // real "tab", so refreshing right now would erase it and the
          // picked photo before their onchange handler ever runs. Data
          // is still synced quietly in the background either way; we
          // just hold off on the visual redraw until they finish.
          App.refresh();
        }
        // For the periodic while-the-tab-stays-open safety net below, we
        // deliberately DON'T force-re-render — the user may be in the
        // middle of typing feedback, selecting a fee student, choosing a
        // WhatsApp account, or (as was the exact bug here) tapping the
        // "ക്ലാസ്സ് അധ്യാപകൻ" button in the feedback box, which a
        // re-render immediately reset back to the "സദർ" default. Cloud
        // data is still updated in memory regardless; it just doesn't
        // force a redraw until the next safe moment above.
      });
    };

    // Debounced: a native <select>/<input type=date> dropdown opening can
    // itself cause a quick hidden→visible blip on some Android WebViews.
    // Waiting a beat before reacting means that blip settles first, and
    // by the time quietSync actually runs, isFormInteractionInProgress()
    // correctly sees the still-open (or just-closed) dropdown.
    let _visChangeTimer = null;
    document.addEventListener("visibilitychange", ()=>{
      clearTimeout(_visChangeTimer);
      _visChangeTimer = setTimeout(()=>quietSync(true), 350);
    });
    window.addEventListener("focus", ()=>quietSync(true));
    window.addEventListener("pageshow", ()=>quietSync(true));
    setInterval(()=>quietSync(false), 120000); // every 2 minutes, as a safety net
  },

    else if(this.isCommittee(u.type)) label = (u.name || "കമ്മിറ്റി") + " — " + (this.ROLE_LABELS[u.type] || "മാനേജ്മെന്റ്");

  // "Remember me" → persist across browser/app restarts via localStorage.
  // Unchecked → sessionStorage only, cleared when the tab/app fully closes.
  getStoredSession(){
    try{
      const local = localStorage.getItem("madrasa_session");
      if(local) return JSON.parse(local);
      const sess = sessionStorage.getItem("madrasa_session");
      if(sess) return JSON.parse(sess);
    }catch(e){}
    return null;
  },
  saveSession(user){
    const remember = document.getElementById("login-remember");
    const json = JSON.stringify(user);
    if(remember && remember.checked){
      localStorage.setItem("madrasa_session", json);
      sessionStorage.removeItem("madrasa_session");
    } else {
      sessionStorage.setItem("madrasa_session", json);
      localStorage.removeItem("madrasa_session");
    }
  },
  clearSession(){
    localStorage.removeItem("madrasa_session");
    sessionStorage.removeItem("madrasa_session");
  },
  retrySyncAndLogin(){
    const errBox = document.getElementById("login-error");
    errBox.innerHTML = "☁️ ഡാറ്റ sync ചെയ്യുന്നു...";
    CLOUD_AUTH_READY.then(()=>{
      DB.syncFromCloud((updated, err)=>{
        if(err){
          errBox.textContent = "Sync പരാജയപ്പെട്ടു. Internet connection പരിശോധിക്കുക.";
          return;
        }
        errBox.textContent = "";
        // Try login again automatically
        this.login();
      });
    });
  },

  login(){
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const errBox = document.getElementById("login-error");
    errBox.textContent = "";

    if(!username){
      errBox.textContent = "യൂസർനെയിം നൽകുക.";
      return;
    }

    const data = DB.data;

    // 0. Parent (username = student reg no) — register number alone is
    // enough to log in, from ANY phone, with no password needed at all.
    // This is checked first so a parent never gets blocked by a missing
    // password. A parent can optionally set their own extra password from
    // their profile (Parent.changePassword), which also still works.
    const student = data.students.find(s => s.reg === username);
    if(student){
      const noPasswordNeeded = !password || password === student.reg;
      const customPasswordMatches = student.parentPassword && password === student.parentPassword;
      if(noPasswordNeeded || customPasswordMatches){
        this.user = { type: "parent", studentId: student.id, studentReg: student.reg, studentName: student.name };
        this.saveSession(this.user);
        this.showApp();
        return;
      }
    }

    if(!password){
      errBox.textContent = "പാസ്‌വേർഡ് നൽകുക.";
      return;
    }

    // 1. Sadhar
    if(username === data.auth.sadhar.username && password === data.auth.sadhar.password){
      this.user = { type: "sadhar" };
      this.saveSession(this.user);
      this.showApp();
      return;
    }

    // 2. Staff (teacher/committee)
    const staff = data.auth.staff.find(s => s.username === username && s.password === password);
    if(staff){
      this.user = { type: staff.role, id: staff.id, name: staff.name, classes: staff.classes || [] };
      this.saveSession(this.user);
      this.showApp();
      return;
    }

    errBox.textContent = "യൂസർനെയിമോ പാസ്‌വേർഡോ തെറ്റാണ്. വീണ്ടും ശ്രമിക്കുക.";
    // Show sync button in case cloud data hasn't loaded yet
    errBox.innerHTML += `<br><br><button class="outline-btn" style="width:100%;margin-top:4px;font-size:13px;" onclick="App.retrySyncAndLogin()">☁️ ഡാറ്റ sync ചെയ്ത് വീണ്ടും ശ്രമിക്കുക</button>`;
  },

  logout(){
    this.clearSession();
    this.user = null;
    document.getElementById("login-username").value = "";
    document.getElementById("login-password").value = "";
    document.getElementById("login-error").textContent = "";
    this.showLogin();
  },

const U = {
  // Returns the Malayalam weekday name for a "YYYY-MM-DD" date string —
  // used so the exam timetable's "day" is always computed automatically
  // from the date instead of being typed separately (avoids mismatches).
  weekdayName(dateStr){
    if(!dateStr) return "";
    const names = ["ഞായർ","തിങ്കൾ","ചൊവ്വ","ബുധൻ","വ്യാഴം","വെള്ളി","ശനി"];
    const d = new Date(dateStr + "T00:00:00");
    return names[d.getDay()] || "";
  },

  // Builds the key used to store a teacher's attendance for ONE SPECIFIC
  // SHIFT on a given day (e.g. "STAFF123@2"). A teacher who teaches more
  // than one shift in a day can now have a different present/absent
  // status per shift, instead of a single value for the whole day.
  staffAttKey(teacherId, shiftKey){
    return `${teacherId}@${shiftKey}`;
  },

  // Returns the right display name for whoever is currently sending a
  // message (fee receipt, attendance alert, exam alert, etc.). Sadhar's
  // App.user object only stores {type:"sadhar"} with no name on it, so
  // it used to fall back to a generic "സ്റ്റാഫ്" label — this pulls the
  // sadhar's actual saved name and adds "(സദർ)" so it's clear who sent
  // it, exactly like a teacher's own name already shows for them.
  senderName(){
    if(App.user && App.user.type === "sadhar"){
      const name = DB.data.auth && DB.data.auth.sadhar && DB.data.auth.sadhar.name;
      return name ? `${name} (സദർ)` : "സദർ";
    }
    if(App.user && App.user.name) return App.user.name;
    return "മദ്റസ ഭരണസമിതി";
  },

  // Renders a saved exam timetable (examName + structured date/day/time/
  // subject rows) as a clean table. Used identically by Sadhar, Teacher,
  // and the student/parent profile view, so it always looks the same and
  // updates everywhere the moment Sadhar edits it.
  timetableTableHtml(tt){
    if(!tt) return `<p class="muted" style="margin-top:8px;">ടൈംടേബിൾ ഇതുവരെ ചേർത്തിട്ടില്ല</p>`;
    const rows = tt.rows || [];
    if(rows.length===0 && tt.content){
      // Backward-compat with old freeform timetables
      return `<div style="font-weight:700; margin-bottom:6px;">${this.esc(tt.examName||"")}</div>
        <pre style="white-space:pre-wrap; font-family:inherit; font-size:13px; margin:0;">${this.esc(tt.content)}</pre>`;
    }
    if(rows.length===0){
      return `<p class="muted" style="margin-top:8px;">ടൈംടേബിൾ ഇതുവരെ ചേർത്തിട്ടില്ല</p>`;
    }
    const sorted = rows.slice().sort((a,b)=> (a.date||"").localeCompare(b.date||""));
    return `<div style="font-weight:700; margin-bottom:6px;">${this.esc(tt.examName||"")}</div>
      <table style="width:100%; font-size:13px;">
        <tr><th>തീയതി</th><th>ദിവസം</th><th>സമയം</th><th>വിഷയം</th></tr>
        ${sorted.map(r=>`<tr>
          <td>${this.displayDateFromStr(r.date)}</td>
          <td>${this.esc(r.day||"")}</td>
          <td>${this.esc(r.time||"")}</td>
          <td>${this.esc(r.subject||"")}</td>
        </tr>`).join("")}
      </table>`;
  },

  // 🐛 MITIGATION (root cause of "gallery-il ninnu photo select cheythu
  // save cheyyumbol automatic aayi back aakunnu"): opening the gallery/file
  // picker sends the browser tab to the background while the OS picker is
  // in the foreground. On low-memory Android phones, the OS can silently
  // KILL that backgrounded tab to free memory. When the user returns, the
  // browser reloads the page from scratch — the whole app cold-starts
  // again, wiping the in-progress edit form and the just-picked file. This
  // isn't something a web page can prevent (Android's own memory manager
  // decides this, and it's more aggressive on cheaper phones) — but we
  // CAN remember which screen was open and jump straight back there
  // instead of leaving the sadhar/parent stranded on the login/home
  // screen, so it feels like "select the photo again" rather than
  // "start over from scratch".
  armPhotoRecovery(tab, restoreFn, restoreArg){
    try{
      sessionStorage.setItem("madrasa_photo_recovery", JSON.stringify({
        tab, restoreFn, restoreArg, savedAt: Date.now()
      }));
    }catch(e){}
  },
  clearPhotoRecovery(){
    try{ sessionStorage.removeItem("madrasa_photo_recovery"); }catch(e){}
  },
  // 🐛 BUG FIX (root cause of "photo picker returns to the list screen
  // instead of the edit form, and the picked photo never saves"):
  // opening the OS gallery/photo picker backgrounds the app, which fires
  // "visibilitychange" the moment the person returns — and the auto-sync
  // in App.startAutoSync() reacts to that by calling App.refresh(). But
  // the student/staff EDIT FORM isn't a real "tab" — it's just HTML
  // swapped into the current tab's container — so App.refresh() wipes it
  // out and redraws the underlying list, discarding the in-progress edit
  // a split second before the person's onchange handler even gets to
  // read the newly-picked file. Since armPhotoRecovery() is already
  // called the moment someone taps a photo field (right before the
  // picker opens), we reuse that same flag here: while it's armed (and
  // recent — a stale flag from an abandoned pick shouldn't block normal
  // refreshes forever), auto-sync still updates the data quietly but
  // skips the re-render, so the edit form and the picked photo survive.
  isPhotoPickInProgress(){
    try{
      const d = JSON.parse(sessionStorage.getItem("madrasa_photo_recovery") || "null");
      if(!d || !d.savedAt) return false;
      return (Date.now() - d.savedAt) < 5*60*1000; // ignore if armed >5 min ago (abandoned pick)
    }catch(e){ return false; }
  },
  // 🐛 BUG FIX (root cause of "class select goes back before I can pick
  // it", same for attendance): tapping a <select> to open its native
  // dropdown (or focusing any input/textarea) fires the same
  // "visibilitychange"/"focus" events as switching apps, on some Android
  // browsers — so the 2-minute background auto-sync's App.refresh() can
  // fire WHILE the dropdown is open, wiping the container's HTML and
  // closing it before the person taps an option. While any select/input/
  // textarea is focused, the data still syncs quietly in the background
  // (see the comment above) but the disruptive re-render is skipped, so
  // the open dropdown / in-progress typing survives.
  // 🐛 BUG FIX v2 (the v1 fix above wasn't quite enough): on many Android
  // WebViews, opening a native <select>/<input type=date> dropdown
  // MOMENTARILY blurs the element — document.activeElement briefly
  // becomes <body> while the OS-level picker overlay is showing, then
  // refocuses once an option is picked or the picker is dismissed. If
  // the 2-minute/visibilitychange auto-sync's App.refresh() lands in
  // that split-second gap, isFormInteractionInProgress() (checking
  // activeElement alone) would incorrectly say "no interaction", and the
  // dropdown still gets wiped out from under the person — which is
  // exactly what was still happening. Fix: track the LAST TIME any
  // select/input/textarea was focused OR blurred, and keep treating
  // "interaction in progress" as true for a short grace window (1.5s)
  // after that — long enough to bridge the native-picker blur gap, short
  // enough not to block genuine background refreshes for long.
  _lastFormFocusAt: 0,
  _initFormFocusTracking(){
    if(this._formFocusTrackingInit) return;
    this._formFocusTrackingInit = true;
    const mark = (e) => {
      if(e.target && ["SELECT","INPUT","TEXTAREA"].includes(e.target.tagName)){
        U._lastFormFocusAt = Date.now();
      }
    };
    document.addEventListener("focusin", mark, true);
    document.addEventListener("focusout", mark, true);
  },
  isFormInteractionInProgress(){
    const el = document.activeElement;
    if(el && ["SELECT","INPUT","TEXTAREA"].includes(el.tagName)) return true;
    return (Date.now() - this._lastFormFocusAt) < 1500;
  },
  // Called once at app startup. If a photo-picker interruption is
  // detected, jumps back to the exact screen and tells the person to
  // re-select the photo (the actual file can never survive a full page
  // reload — browsers don't allow that — so this is the best we can do).
  tryRestorePhotoRecovery(){
    let draft;
    try{ draft = JSON.parse(sessionStorage.getItem("madrasa_photo_recovery") || "null"); }catch(e){ draft = null; }
    if(!draft || !draft.tab) return;
    this.clearPhotoRecovery();
    if(Date.now() - (draft.savedAt||0) > 10*60*1000) return; // stale (>10 min) — ignore
    if(!App.user) return; // got logged out in between — nothing to restore into
    App.goTo(draft.tab);
    const actions = {
      editStudent: (arg)=>Sadhar.editStudent(arg),
      editStaff: (arg)=>Sadhar.editStaff(arg)
    };
    if(draft.restoreFn && actions[draft.restoreFn]){
      setTimeout(()=>{ actions[draft.restoreFn](draft.restoreArg); }, 50);
    }
    this.toast("ഫോട്ടോ തിരഞ്ഞെടുക്കുന്നതിനിടെ ആപ്പ് പുനരാരംഭിച്ചു — ദയവായി ഫോട്ടോ ഒന്നുകൂടെ select ചെയ്ത് സേവ് ചെയ്യുക", 4000);
  },

  toast(msg, ms=2200){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(()=> el.classList.remove("show"), ms);
  },

  uid(prefix="ID"){
    return prefix + Date.now().toString(36) + Math.floor(Math.random()*1000);
  },

  todayStr(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
  },

  todayDisplay(){
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + d.getFullYear();
  },

  // True once every date in the exam timetable has passed. Used to hide
  // a finished exam's timetable/hall-ticket from students automatically,
  // without ever deleting the underlying data — Sadhar can still see the
  // full history (past and future dates) from their own panel.
  isExamOver(tt){
    if(!tt || !tt.rows || !tt.rows.length) return false;
    const today = this.todayStr();
    return tt.rows.every(r => r.date && r.date < today);
  },

  // Convert "YYYY-MM-DD" to "DD/MM/YYYY"
  displayDateFromStr(dateStr){
    const parts = dateStr.split("-");
    if(parts.length !== 3) return dateStr;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  },

  // After dynamically changing content inside an open accordion, recalc its max-height
  // so the new (taller) content isn't clipped.
  // Shared hall-ticket (exam admit card) generator — used both by a
  // student's own download button and by Sadhar downloading on behalf of
  // a student who has trouble doing it themselves.
  downloadHallTicketFor(student){
    const tt = DB.data.timetables[student.cls];
    const rows = (tt && tt.rows && tt.rows.length)
      ? tt.rows.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")) : [];
    if(!rows.length){ this.toast("ഈ ക്ലാസിന് പരീക്ഷാ ടൈംടേബിൾ ഇതുവരെ ചേർത്തിട്ടില്ല"); return; }
    const examName = (tt && tt.examName) || "പരീക്ഷ";
    const clsLabel = CLASS_LABELS[student.cls] || student.cls;
    const U_ = this;

    const draw = (photoImg) => {
      const rowH = 46, tableHeaderH = 32, headerH = 150, infoH = 150, footerH = 60, padding = 24;
      const canvas = document.createElement("canvas");
      canvas.width = 700;
      canvas.height = headerH + infoH + tableHeaderH + rows.length * rowH + footerH + padding;
      const ctx = canvas.getContext("2d");

      // Admit-card style border
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "#C9A84C";
      ctx.lineWidth = 4;
      ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);

      // Header band: madrasa name (large), board name, address, then the
      // hall ticket / exam name line.
      ctx.fillStyle = "#0F4C4C";
      ctx.fillRect(10, 10, canvas.width - 20, headerH - 10);
      ctx.textAlign = "center";
      ctx.fillStyle = "#C9A84C";
      ctx.font = "bold 26px sans-serif";
      ctx.fillText("മമ്പഉൽ ഉലൂം മദ്രസ", canvas.width / 2, 46);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 14px sans-serif";
      ctx.fillText("സമസ്ത കേരള ഇസ്ലാം മത വിദ്യാഭ്യാസ ബോർഡ്", canvas.width / 2, 68);
      ctx.font = "13px sans-serif";
      ctx.fillStyle = "#d8e6e0";
      ctx.fillText("കൊറക്കോട്, കാസറഗോഡ്", canvas.width / 2, 88);
      ctx.strokeStyle = "#C9A84C";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(canvas.width/2 - 120, 100);
      ctx.lineTo(canvas.width/2 + 120, 100);
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 16px sans-serif";
      ctx.fillText("ഹോൾ ടിക്കറ്റ് (Hall Ticket) — " + examName, canvas.width / 2, 124);

      // Student info block — passport-size photo on the right side, text
      // on the left.
      const infoY = headerH + 16;
      const photoW = 100, photoH = 130;
      const photoX = canvas.width - photoW - 30;
      if(photoImg){
        // Draw the photo cropped to fill the frame (cover, not stretch)
        // so it looks like a proper passport photo rather than a
        // squashed thumbnail.
        const srcRatio = photoImg.width / photoImg.height;
        const dstRatio = photoW / photoH;
        let sx, sy, sw, sh;
        if(srcRatio > dstRatio){
          sh = photoImg.height;
          sw = sh * dstRatio;
          sx = (photoImg.width - sw) / 2;
          sy = 0;
        } else {
          sw = photoImg.width;
          sh = sw / dstRatio;
          sx = 0;
          sy = (photoImg.height - sh) / 2;
        }
        ctx.drawImage(photoImg, sx, sy, sw, sh, photoX, infoY, photoW, photoH);
      } else {
        ctx.fillStyle = "#e8f0e8";
        ctx.fillRect(photoX, infoY, photoW, photoH);
        ctx.fillStyle = "#0F4C4C";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("ഫോട്ടോ", photoX + photoW/2, infoY + photoH/2);
      }
      ctx.strokeStyle = "#0F4C4C";
      ctx.lineWidth = 2;
      ctx.strokeRect(photoX, infoY, photoW, photoH);

      ctx.textAlign = "left";
      ctx.fillStyle = "#1a5c42";
      ctx.font = "bold 20px sans-serif";
      ctx.fillText(student.name, 24, infoY + 26);
      ctx.fillStyle = "#333";
      ctx.font = "15px sans-serif";
      ctx.fillText("രജിസ്റ്റർ നമ്പർ: " + student.reg, 24, infoY + 58);
      ctx.fillText("ക്ലാസ്സ്: " + clsLabel, 24, infoY + 84);
      ctx.fillText("പരീക്ഷ: " + examName, 24, infoY + 110);

      // Divider
      ctx.strokeStyle = "#e0e0e0";
      ctx.beginPath();
      ctx.moveTo(20, infoY + photoH + 14);
      ctx.lineTo(canvas.width - 20, infoY + photoH + 14);
      ctx.stroke();

      // Table header
      const tableTop = infoY + photoH + 22;
      ctx.fillStyle = "#e8f0e8";
      ctx.fillRect(10, tableTop, canvas.width - 20, tableHeaderH);
      ctx.fillStyle = "#0F4C4C";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("തീയതി", 24, tableTop + 21);
      ctx.fillText("ദിവസം", 190, tableTop + 21);
      ctx.fillText("സമയം", 300, tableTop + 21);
      ctx.fillText("വിഷയം", 470, tableTop + 21);

      // Rows
      rows.forEach((r, i) => {
        const y = tableTop + tableHeaderH + i * rowH;
        ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#f5faf5";
        ctx.fillRect(10, y, canvas.width - 20, rowH);
        ctx.fillStyle = "#1a5c42";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(U_.displayDateFromStr(r.date), 24, y + 27);
        ctx.fillStyle = "#333";
        ctx.font = "13px sans-serif";
        ctx.fillText(r.day || "", 190, y + 27);
        ctx.fillText(r.time || "", 300, y + 27);
        ctx.fillStyle = "#0F4C4C";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(r.subject || "", 470, y + 27);
        ctx.strokeStyle = "#e0e0e0";
        ctx.beginPath();
        ctx.moveTo(10, y + rowH - 1);
        ctx.lineTo(canvas.width - 10, y + rowH - 1);
        ctx.stroke();
      });

      // Footer: signature line + note
      const fy = tableTop + tableHeaderH + rows.length * rowH + 14;
      ctx.strokeStyle = "#0F4C4C";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(canvas.width - 210, fy + 34);
      ctx.lineTo(canvas.width - 30, fy + 34);
      ctx.stroke();
      ctx.fillStyle = "#333";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("സൂപ്രണ്ട് ഒപ്പ്", canvas.width - 120, fy + 50);
      ctx.textAlign = "left";
      ctx.fillStyle = "#666";
      ctx.font = "11px sans-serif";
      ctx.fillText("ദയവായി ഈ ഹോൾ ടിക്കറ്റ് പരീക്ഷാ ദിവസങ്ങളിൽ കൈയിൽ കരുതുക", 24, fy + 50);

      const link = document.createElement("a");
      link.download = "hall_ticket_" + student.reg + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      U_.toast("🎫 " + student.name + " — ഹോൾ ടിക്കറ്റ് ഡൗൺലോഡ് ആയി!");
    };

    if(student.photo){
      const img = new Image();
      img.onload = () => draw(img);
      img.onerror = () => draw(null);
      img.src = student.photo;
    } else {
      draw(null);
    }
  },

  fixAccordionHeight(el){
    let node = el;
    while(node && node !== document.body){
      if(node.classList && node.classList.contains('accordion-item') && node.classList.contains('open')){
        const body = node.querySelector('.accordion-body');
        if(body) body.style.maxHeight = body.scrollHeight + 'px';
        return;
      }
      node = node.parentElement;
    }
  },

  // Return all date strings ("YYYY-MM-DD") for a given month ("YYYY-MM"),
  // clamped to academic year start (2026-06-01) and today.
  datesInMonth(monthKey){
    const [y, m] = monthKey.split("-").map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    const start = new Date("2026-06-01T00:00:00");

    // SAFETY: some Android phones briefly have a wrong system clock
    // (e.g. just after a factory reset, or before the network time
    // syncs), which would make every academic-year date look "in the
    // future" and silently wipe out the whole report ("this month
    // hasn't started yet") even though real attendance/fee data already
    // exists for it. To guard against that, the cutoff is never earlier
    // than the most recent date that already has real attendance data
    // recorded against it — so a temporarily wrong clock can't hide
    // data that's already been entered.
    let today = new Date();
    today.setHours(0,0,0,0);
    const attendanceDateKeys = Object.keys(DB.data.attendance || {}).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
    if(attendanceDateKeys.length){
      const latestRecorded = attendanceDateKeys.sort().pop();
      const latestRecordedDate = new Date(latestRecorded + "T00:00:00");
      if(latestRecordedDate > today) today = latestRecordedDate;
    }

    const dates = [];
    for(let d=1; d<=daysInMonth; d++){
      const dt = new Date(y, m-1, d);
      if(dt < start) continue;
      if(dt > today) continue;
      const ds = dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,'0') + "-" + String(dt.getDate()).padStart(2,'0');
      dates.push(ds);
    }
    return dates;
  },

  // "മകൻ" / "മകൾ" based on gender field, fallback to "മകൻ/മകൾ"
  childWord(student){
    if(student.gender === 'm') return "മകൻ";
    if(student.gender === 'f') return "മകൾ";
    return "മകൻ/മകൾ";
  },

  esc(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  },

  studentById(id){
    return DB.data.students.find(s => s.id === id);
  },
  studentByReg(reg){
    return DB.data.students.find(s => s.reg === reg);
  },
  studentsByClass(cls){
    return DB.data.students.filter(s => s.cls === cls);
  },

  classShift(cls){
    for(const sk of [1,2,3]){
      if(DB.data.shifts[sk].classes.includes(cls)) return sk;
    }
    return null;
  },

  // Self-healing fallback for staff attendance display: the primary
  // record is the explicit staffAttKey flag written when a teacher marks
  // their own class's attendance (see Teacher.markAttendance). But that's
  // a single write that depends on the right device/session state at that
  // exact moment — if it's ever missing (e.g. an older device that hadn't
  // synced the newest staff record, a dropped request, etc.) the teacher
  // would wrongly show as unmarked even though they clearly did take
  // attendance. This checks for the more fundamental evidence: did ANY
  // student in one of this teacher's classes for this shift get an
  // attendance entry today? If so, they were there. This is only used
  // when the explicit flag is missing — an explicit "absent" (e.g. set
  // manually by Sadhar) always takes priority and is never overridden.
  teacherTookAttendance(t, shiftKey, dateStr){
    const dayAtt = DB.data.attendance[dateStr];
    if(!dayAtt) return false;
    const classesInShift = (t.classes||[]).filter(c => this.classShift(c) === shiftKey);
    return classesInShift.some(cls =>
      this.studentsByClass(cls).some(s => dayAtt[s.id] !== undefined)
    );
  },

  // Check holidayLog for whether a given class's shift was on holiday on dateStr
  isHolidayForClass(dateStr, cls){
    const shift = this.classShift(cls);
    return (DB.data.holidayLog || []).some(h =>
      h.date === dateStr && (
        h.target === "all" ||
        parseInt(h.target) === shift ||
        h.target === "cls_" + cls
      )
    );
  },


  shiftHoliday(shiftKey){
    const h = DB.data.holidays;
    const today = this.todayStr();
    if(h["all"] && h["all"].active && h["all"].date === today) return h["all"];
    if(h[String(shiftKey)] && h[String(shiftKey)].active && h[String(shiftKey)].date === today) return h[String(shiftKey)];
    return null;
  },

  initials(name){
    if(!name) return "?";

  photoOrInitial(photo, name, cls="photo-circle"){

  // WhatsApp link opener — lets the user pick WhatsApp vs WhatsApp Business
  // every time, instead of silently using whichever app the phone treats
  // as "default". This matters because a sadhar/ustad may have two
  // WhatsApp accounts (e.g. a personal one and one with the madrasa
  // number) and needs receipts/notices to go out from the correct one.
  sendWhatsApp(phone, message, forcedApp){
    let p = (phone || "").replace(/\D/g,"");
    if(p.length === 10) p = "91" + p;
    const text = encodeURIComponent(message);
    const isAndroid = /Android/i.test(navigator.userAgent);

    const openWith = (app) => {
      if(isAndroid){
        const pkg = app === "business" ? "com.whatsapp.w4b" : "com.whatsapp";
        // Direct package-targeted intent — this bypasses the phone's
        // "default app" setting entirely, so it reliably opens the exact
        // app chosen, every single time.
        const intentUrl = `intent://send?phone=${p}&text=${text}#Intent;scheme=whatsapp;package=${pkg};end`;
        window.location.href = intentUrl;
      } else {
        // iOS/desktop: WhatsApp Business has no separate URL scheme there,
        // so just use the normal wa.me link.
        window.open(`https://wa.me/${p}?text=${text}`, "_blank");
      }
    };

    if(forcedApp){ openWith(forcedApp); return; }

    if(!isAndroid){
      // iOS/desktop has no reliable way to pick between two WhatsApp apps —
      // fall back to the normal link.
      window.open(`https://wa.me/${p}?text=${text}`, "_blank");
      return;
    }

    const remembered = localStorage.getItem("madrasa_wa_app_pref");
    if(remembered){ openWith(remembered); return; }

    U.showWhatsAppChooser(openWith);
  },

  // Small popup letting the user pick which WhatsApp app to send from.
  showWhatsAppChooser(onChoose){
    const old = document.getElementById("wa-chooser-overlay");
    if(old) old.remove();
    const overlay = document.createElement("div");
    overlay.id = "wa-chooser-overlay";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;";
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:20px;max-width:340px;width:100%;">
        <div style="font-weight:700;font-size:16px;margin-bottom:12px;">ഏത് WhatsApp-ൽ നിന്ന് അയക്കണം?</div>
        <button id="wa-choose-personal" class="primary-btn btn-block" style="margin-bottom:10px;">📱 WhatsApp</button>
        <button id="wa-choose-business" class="primary-btn btn-block" style="margin-bottom:14px;">💼 WhatsApp Business</button>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:12px;">
          <input type="checkbox" id="wa-remember-choice" style="width:16px;height:16px;margin:0;">
          ഈ ഫോണിൽ ഇനി എപ്പോഴും ഇത് തിരഞ്ഞെടുത്തത് ഉപയോഗിക്കുക
        </label>
        <button id="wa-choose-cancel" class="outline-btn btn-block">റദ്ദാക്കുക</button>
      </div>`;
    document.body.appendChild(overlay);

    const pick = (app) => {
      if(document.getElementById("wa-remember-choice").checked){
        localStorage.setItem("madrasa_wa_app_pref", app);
      }
      overlay.remove();
      onChoose(app);
    };
    document.getElementById("wa-choose-personal").onclick = () => pick("personal");
    document.getElementById("wa-choose-business").onclick = () => pick("business");
    document.getElementById("wa-choose-cancel").onclick = () => overlay.remove();

  // Lets a user clear a previously "remembered" WhatsApp app choice, in
  // case they want to be asked again, or chose the wrong one by mistake.
  resetWhatsAppChoice(){
    localStorage.removeItem("madrasa_wa_app_pref");
    U.toast("ഇനി WhatsApp അയക്കുമ്പോൾ വീണ്ടും ചോദിക്കും ✓");

  // ===================================================================
  // NOTIFICATIONS
  // Shows a local device notification (via the Service Worker, so it
  // can appear even if this tab isn't focused) when the sadhar declares
  // a new holiday, publishes a public announcement, or updates an exam
  // timetable. IMPORTANT HONEST LIMITATION: this only works reliably
  // while the app is open, recently used, or briefly backgrounded —
  // Android can freeze a fully closed PWA tab, so this is NOT a
  // guaranteed "wake the phone up" push notification (that would need
  // a Firebase Cloud Messaging server setup, which this app doesn't
  // have). This is the best available without adding a paid backend.
  // ===================================================================
  enableNotifications(){
    if(!("Notification" in window)){
      U.toast("ഈ ബ്രൗസർ Notification പിന്തുണക്കുന്നില്ല");
      return;
    }
    Notification.requestPermission().then(perm=>{
      if(perm === "granted"){
        U.toast("Notification ഓൺ ആയി ✓");
        localStorage.setItem("madrasa_notif_enabled", "1");
      } else {
        U.toast("Notification അനുവദിച്ചില്ല — ബ്രൗസർ സെറ്റിങ്സിൽ മാറ്റാം");
      }
    });
  },

  showNotification(title, body){
    if(!("Notification" in window)) return;
    if(Notification.permission !== "granted") return;
    if(localStorage.getItem("madrasa_notif_enabled") !== "1") return;
    const opts = { body, icon: "https://arshuak42-netizen.github.io/mambaul-uloom-madrasa/icon-192.png", tag: "madrasa-" + Date.now() };
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        if(reg && reg.showNotification) reg.showNotification(title, opts);
        else new Notification(title, opts);
      }).catch(()=>{ try{ new Notification(title, opts); }catch(e){} });
    } else {
      try{ new Notification(title, opts); }catch(e){}
    }
  },

  // Compares the current relevant data (holiday for this person's
  // shift/class, today's announcements, this class's timetable) against
  // a small "last seen" watermark stored on this device, and fires a
  // notification for anything new. Called after every successful
  // background sync. Safe to call for parent students; teachers get a
  // simpler version checking just announcements+holiday for their shift.
  checkNewNotificationsForStudent(s){
    if(!s) return;
    const watermarkKey = "madrasa_notif_watermark_" + s.reg;
    let watermark = {};
    try{ watermark = JSON.parse(localStorage.getItem(watermarkKey) || "{}"); }catch(e){}

    const shiftKey = U.classShift(s.cls);
    const holiday = U.shiftHoliday(shiftKey) || (DB.data.holidays["cls_"+s.cls] && DB.data.holidays["cls_"+s.cls].active ? DB.data.holidays["cls_"+s.cls] : null);
    const holidaySignature = holiday ? (holiday.date + "|" + holiday.reason) : "";
    if(holidaySignature && holidaySignature !== watermark.holiday){
      U.showNotification("📅 ഇന്ന് അവധി!", holiday.reason || "മദ്റസയിൽ ഇന്ന് അവധിയാണ്");
    }

    const todayDisp = U.todayDisplay();
    const todaysAnns = DB.data.announcements.filter(a=>{
      if(a.date !== todayDisp) return false;
      if(a.target==='all') return true;
      return DB.data.shifts[a.target] && DB.data.shifts[a.target].classes.includes(s.cls);
    });
    const annIds = todaysAnns.map(a=>a.id).sort().join(",");
    if(annIds && annIds !== watermark.annIds){
      const newest = todaysAnns[todaysAnns.length-1];
      if(newest) U.showNotification("📢 പുതിയ അറിയിപ്പ്", newest.text.slice(0,100));
    }

    const tt = DB.data.timetables[s.cls];
    const ttSignature = tt && tt.rows ? tt.rows.map(r=>r.id+r.date+r.time+r.subject).join("|") : "";
    if(ttSignature && ttSignature !== watermark.tt){
      U.showNotification("📝 പരീക്ഷാ ടൈംടേബിൾ പുതുക്കി", (tt.examName||"പരീക്ഷ") + " — സമയവിവരപ്പട്ടിക നോക്കുക");
    }

    localStorage.setItem(watermarkKey, JSON.stringify({ holiday: holidaySignature, annIds, tt: ttSignature }));
  },

  // Send to a WhatsApp group link
  sendWhatsAppGroup(groupLink, message){
    if(!groupLink){ U.toast("ഗ്രൂപ്പ് ലിങ്ക് നൽകിയിട്ടില്ല"); return; }
    const isAndroid = /Android/i.test(navigator.userAgent);

    const openWith = (app) => {
      navigator.clipboard.writeText(message).then(()=>{
        U.toast("Message copied! ഗ്രൂപ്പ് തുറന്ന് paste ചെയ്യുക ✓");
      }).catch(()=>{
        U.toast("ഗ്രൂപ്പ് തുറക്കുന്നു — message manually paste ചെയ്യുക");
      });
      if(isAndroid && app){
        // Force-open with the EXACT chosen app (personal or business),
        // bypassing the phone's "default app" setting — this is what
        // fixes the group link opening in the wrong WhatsApp (the one
        // with no madrasa groups in it).
        const pkg = app === "business" ? "com.whatsapp.w4b" : "com.whatsapp";
        const withoutScheme = groupLink.replace(/^https?:\/\//, "");
        window.location.href = `intent://${withoutScheme}#Intent;scheme=https;package=${pkg};end`;
      } else {
        window.open(groupLink, "_blank");
      }
    };

    if(!isAndroid){
      openWith(null);
      return;
    }

    const remembered = localStorage.getItem("madrasa_wa_app_pref");
    if(remembered){ openWith(remembered); return; }

    U.showWhatsAppChooser(openWith);
  },

  readImageFile(file, callback){
    const reader = new FileReader();
    reader.onload = (e) => callback(e.target.result);
    reader.readAsDataURL(file);
  },

  // Like readImageFile, but resizes/compresses the image first (max 480px,
  // JPEG quality ~0.72). Used for all people-photos (sadhar, staff,
  // students) so that — now that photos are included in cloud sync —
  // the synced payload stays small and fast even with 100+ photos.
  // (Not used for the fee QR code, which must stay pixel-accurate.)
  readPhotoFile(file, callback){
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 480;
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        try{
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.72));
        }catch(err){
          callback(e.target.result); // fallback to original on any canvas error
        }
      };
      img.onerror = () => callback(e.target.result);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },

  // Generate fee receipt message. recipientType: 'parent' | 'gs' | 'manager'
  feeMessage(student, paidNow, dateStr, months, recipientType){
    const totalPaid = student.paidTotal;
    const annual = DB.data.fees.annual;
    const balance = Math.max(annual - totalPaid, 0);
    const collectorName = U.senderName();
    const collectorRole = (App.user && App.user.type === 'sadhar') ? "സദർ" : "ക്ലാസ്സ് അധ്യാപകൻ";
    const monthsText = (months && months.length) ? ` (${months.map(mk=>MONTH_LABELS[mk]||mk).join(", ")} മാസത്തെ ഫീസ്)` : "";

    let greeting;
    if(recipientType === 'gs') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട ജനറൽ സെക്രട്ടറി,";
    else if(recipientType === 'manager') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട മാനേജർ,";
    else greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട രക്ഷിതാവേ,";

    let body;
    if(recipientType === 'parent'){
      body = `നിങ്ങളുടെ ${U.childWord(student)} ${student.name} (${CLASS_LABELS[student.cls] || student.cls}, Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    } else {
      body = `${CLASS_LABELS[student.cls] || student.cls} ക്ലാസ്സിൽ പഠിക്കുന്ന ${student.name} (Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    }

    return `${greeting}\n\n${body}\n\nനന്ദി. - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
  },

  // Generate a fee DUE reminder message (not a receipt) for a parent —
  // used to nudge parents who still owe a balance.
  feeDueReminderMessage(student){
    const annual = DB.data.fees.annual;
    const balance = Math.max(annual - (student.paidTotal||0), 0);
    // For fee-due reminders, show the management title (General Secretary
    // or Manager) rather than the individual teacher's name, so parents

    // than a personal one from whichever teacher happened to send it.
    // (Fee receipts still show the actual collector's name — that's only
    // for internal accounting, not visible to parents in the same way.)
    const user = App.user;
    let title = "മദ്റസ ഭരണസമിതി";
    if(user){
      if(user.type === "sadhar") title = "സദർ";
      else if(user.role === "gs") title = "ജനറൽ സെക്രട്ടറി";
      else if(user.role === "manager") title = "മാനേജർ";
      else if(user.role === "teacher") title = "ജനറൽ സെക്രട്ടറി / മദ്റസ ഭരണസമിതി";
    }
    return `അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട രക്ഷിതാവേ,\n\n${U.childWord(student)} ${student.name} (${CLASS_LABELS[student.cls] || student.cls}, Reg No: ${student.reg})-ന്റെ ഫീസ് കുടിശ്ശിക ₹${balance} ആയിട്ടുണ്ട്. എത്രയും വേഗം ഫീസ് അടച്ച് സഹകരിക്കണമെന്ന് അഭ്യർത്ഥിക്കുന്നു.\n\nനന്ദി. - ${title}, മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
  },

  // Returns a Set of month-keys already covered by any payment for this student.
  // If excludePaymentIndex is given, that payment's own months are not counted (so they remain selectable while editing it).
  paidMonthsSet(student, excludePaymentIndex){
    const set = new Set();
    (student.payments||[]).forEach((p,i)=>{
      if(i === excludePaymentIndex) return;
      (p.months||[]).forEach(m=>set.add(m));
    });
    return set;
  },

  // accordion toggle
  toggleAccordion(id){
    const el = document.getElementById(id);
    if(!el) return;
    const wasOpen = el.classList.contains("open");
    el.classList.toggle("open");
    const body = el.querySelector(".accordion-body");
    if(!wasOpen){
      body.style.maxHeight = body.scrollHeight + "px";
    } else {
      body.style.maxHeight = "0px";
    }
  }
};

// ===========================================================
// FeeShared — common fee-collection UI for Sadhar (all classes)
