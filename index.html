  setExamDayHoliday(){
    const dateStr = document.getElementById("holiday-date-exam").value || U.todayStr();
    const reason = document.getElementById("holiday-reason-exam").value.trim() || "പരീക്ഷ — പരീക്ഷയില്ലാത്ത ക്ലാസുകൾക്ക് അവധി";
    const examClasses = this.examClassesForDate(dateStr);
    const nonExamClasses = this.allClassesList().filter(c=>!examClasses.includes(c));

    if(!examClasses.length){
      U.toast("ഈ തീയതിക്ക് ഒരു ക്ലാസിനും പരീക്ഷാ ടൈംടേബിൾ ചേർത്തിട്ടില്ല");
      return;
    }
    if(!nonExamClasses.length){
      U.toast("എല്ലാ ക്ലാസിനും ഈ ദിവസം പരീക്ഷയുണ്ട് — അവധി വേണ്ട ക്ലാസുകൾ ഇല്ല");
      return;
    }

    if(!DB.data.holidayLog) DB.data.holidayLog = [];
    nonExamClasses.forEach(cls=>{
      const key = "cls_" + cls;
      DB.data.holidays[key] = { active:true, reason, date: dateStr, cls };
      DB.data.holidayLog.push({ date: dateStr, target: key, reason, cls });
      // Same as setClassHoliday: only clear attendance already entered
      // for this exact date, never any other day.
      if(DB.data.attendance[dateStr]){
        DB.data.students.filter(s=>s.cls===cls).forEach(s=>{
          delete DB.data.attendance[dateStr][s.id];
        });
      }
    });

    DB.save();
    if(DB.data.attendance[dateStr]) DB.pushAttendanceDate(dateStr);
    const isToday = (dateStr === U.todayStr());
    U.toast(`🎓 ${nonExamClasses.length} ക്ലാസിന് ${isToday ? 'ഇന്ന്' : U.displayDateFromStr(dateStr)} അവധി പ്രഖ്യാപിച്ചു (പരീക്ഷയില്ലാത്തതിനാൽ)`);
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  setClassHoliday(){
    const checkboxes = document.querySelectorAll("#holiday-class-checkboxes input[type=checkbox]:checked");
    const selectedClasses = Array.from(checkboxes).map(cb=>cb.value);
    const reason = document.getElementById("holiday-reason-class").value.trim();
    const holidayDate = document.getElementById("holiday-date-class").value || U.todayStr();
    if(!selectedClasses.length){ U.toast("ഒരു ക്ലാസ് എങ്കിലും തിരഞ്ഞെടുക്കുക"); return; }
    if(!reason){ U.toast("കാരണം നൽകുക"); return; }

    if(!DB.data.holidayLog) DB.data.holidayLog = [];

    selectedClasses.forEach(cls=>{
      const key = "cls_" + cls;
      DB.data.holidays[key] = { active:true, reason, date: holidayDate, cls };
      DB.data.holidayLog.push({ date: holidayDate, target: key, reason, cls });
      // Clear attendance ONLY for the SELECTED date (not blindly "today")
      // — same fix as the shift holiday above.
      if(DB.data.attendance[holidayDate]){
        DB.data.students.filter(s=>s.cls===cls).forEach(s=>{
          delete DB.data.attendance[holidayDate][s.id];
        });
      }
    });

    DB.save();
    if(DB.data.attendance[holidayDate]) DB.pushAttendanceDate(holidayDate);
    const isToday = (holidayDate === U.todayStr());
    U.toast(isToday ? `${selectedClasses.length} ക്ലാസിന് അവധി പ്രഖ്യാപിച്ചു` : `${selectedClasses.length} ക്ലാസിന് ${U.displayDateFromStr(holidayDate)}-ലെ അവധി പ്രഖ്യാപിച്ചു`);
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  setHoliday(){
    const target = document.getElementById("holiday-target").value;
    const reason = document.getElementById("holiday-reason-shift").value.trim();
    const holidayDate = document.getElementById("holiday-date-shift").value || U.todayStr();
    if(!reason){
      U.toast("കാരണം നൽകുക");
      return;
    }
    DB.data.holidays[target] = { active:true, reason, date: holidayDate };
    if(!DB.data.holidayLog) DB.data.holidayLog = [];
    DB.data.holidayLog.push({ date: holidayDate, target, reason });

    // Clear attendance ONLY for the SELECTED holiday date — not blindly
    // "today". This is the fix: declaring a holiday for an upcoming date
    // (e.g. tomorrow or next week) used to also wipe TODAY's already-
    // recorded attendance, because the old code always cleared "today"
    // regardless of which date the holiday was actually for. Now, if the
    // holiday date is in the future, today's attendance is left
    // completely untouched; only attendance already entered for that
    // specific future date (if any) gets cleared, since that day is now
    // a holiday and shouldn't have stray attendance marks sitting in it.
    if(DB.data.attendance[holidayDate]){
      const affectedShifts = (target === "all") ? [1,2,3] : [parseInt(target)];
      DB.data.students.forEach(s=>{
        const sh = U.classShift(s.cls);
        if(affectedShifts.includes(sh)){
          delete DB.data.attendance[holidayDate][s.id];
        }
      });
      DB.data.auth.staff.forEach(st=>{
        if(st.role !== 'teacher') return;
        const teacherShifts = (st.classes || []).map(c=>U.classShift(c)).filter(Boolean);
        if(teacherShifts.some(sh=>affectedShifts.includes(sh))){
          // Clear every shift-keyed attendance entry for this teacher on
          // the holiday date (e.g. "STAFF123@1", "STAFF123@2"), not just
          // a single non-shift-specific key.
          teacherShifts.forEach(sh=>{
            if(affectedShifts.includes(sh)) delete DB.data.attendance[holidayDate][U.staffAttKey(st.id, sh)];
          });
        }
      });
    }

    DB.save();
    if(DB.data.attendance[holidayDate]) DB.pushAttendanceDate(holidayDate);
    const isToday = (holidayDate === U.todayStr());
    U.toast(isToday ? "അവധി പ്രഖ്യാപിച്ചു. ഇന്നത്തെ ഹാജർ ക്ലിയർ ചെയ്തു." : `${U.displayDateFromStr(holidayDate)}-ലെ അവധി പ്രഖ്യാപിച്ചു.`);
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  clearHoliday(key){
    delete DB.data.holidays[key];
    DB.save();
    U.toast("അവധി റദ്ദാക്കി");
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  showAttendanceHistory(){
    const date = document.getElementById("att-history-date").value;
    const resBox = document.getElementById("att-history-result");
    if(!date){ resBox.innerHTML = ""; return; }

    // Show holiday info for this exact date, if any was declared —
    // this works for ANY date (past, today, etc.), unlike the "current
    // holidays" list above which only shows today's.
    const holidaysOnDate = (DB.data.holidayLog || []).filter(h => h.date === date);
    let holidayHtml = "";
    if(holidaysOnDate.length){
      holidayHtml = `<div style="margin-top:8px;">` + holidaysOnDate.map(h=>{
        const label = h.target === 'all' ? 'എല്ലാ ഷിഫ്റ്റും'
          : h.cls ? `ക്ലാസ്: ${U.esc(h.cls)}`
          : `ഷിഫ്റ്റ് ${U.esc(h.target)}`;
        return `<div class="row" style="background:var(--bg2);border-radius:8px;padding:8px;margin-bottom:6px;">
          <span>📅 <strong>${label}</strong> — ${U.esc(h.reason||'')}</span>
        </div>`;
      }).join("") + `</div>`;
    }

    const att = DB.data.attendance[date];
    if(!att){
      resBox.innerHTML = holidayHtml + `<p class="muted" style="margin-top:8px;">ഈ തീയതിക്ക് ഹാജർ രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
      return;
    }
    let present=0, absent=0;
    DB.data.students.forEach(s=>{
      if(att[s.id]==='present') present++;
      else if(att[s.id]==='absent') absent++;
    });
    resBox.innerHTML = holidayHtml + `<div class="row" style="margin-top:8px;">
      <span class="pill green">ഹാജർ: ${present}</span>
      <span class="pill red">അസാന്നിധ്യം: ${absent}</span>
    </div>`;
  },

  // Shows Sadhar an at-a-glance status for the currently-selected class's
  // exam: upcoming/ongoing (with the date range), or finished (still
  // visible here for Sadhar's own reference — students stop seeing it
  // automatically once every date has passed, see U.isExamOver).
  examStatusBadgeHtml(tt){
    if(!tt || !tt.rows || !tt.rows.length) return "";
    const rows = tt.rows.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const first = U.displayDateFromStr(rows[0].date);
    const last = U.displayDateFromStr(rows[rows.length-1].date);
    const range = first === last ? first : `${first} — ${last}`;
    if(U.isExamOver(tt)){
      return `<div class="pill" style="background:#eee;color:#555;margin-bottom:10px;">✅ പരീക്ഷ കഴിഞ്ഞു (${range}) — ഇനി ഇത് കുട്ടികളുടെ പ്രൊഫൈലിൽ കാണില്ല</div>`;
    }
    return `<div class="pill green" style="margin-bottom:10px;">🗓️ പരീക്ഷ: ${range}</div>`;
  },

  downloadAllHallTicketsForClassUI(){
    const cls = (document.getElementById("tt-class")||{}).value;
    if(!cls) return;
    const students = U.studentsByClass(cls);
    if(!students.length){ U.toast("ഈ ക്ലാസിൽ കുട്ടികൾ ഇല്ല"); return; }
    const tt = DB.data.timetables[cls];

    U.toast(`🎫 ${students.length} കുട്ടികളുടെയും ഹോൾ ടിക്കറ്റ് ഡൗൺലോഡ് ചെയ്യുന്നു...`);

  loadTimetable(){
    const clsEl = document.getElementById("tt-class");
    if(!clsEl) return;
    const cls = clsEl.value;
    const tt = DB.data.timetables[cls];
    const examNameEl = document.getElementById("tt-exam-name");
    if(examNameEl) examNameEl.value = tt ? (tt.examName||"") : "";
    const statusEl = document.getElementById("tt-exam-status");
    if(statusEl) statusEl.innerHTML = this.examStatusBadgeHtml(tt);
    const waList = document.getElementById("tt-wa-list");
    if(waList) waList.innerHTML = "";
    const rowsBox = document.getElementById("tt-rows-box");
    if(rowsBox){
      rowsBox.innerHTML = this.timetableRowsHtml(cls);
      // A class with more exam rows than whatever was showing when this
      // accordion was first opened made the content taller than the
      // accordion's fixed max-height, silently clipping everything below
      // it (including the WhatsApp/alert buttons) via overflow:hidden —
      // this recalculates the height so nothing gets cut off.
      U.fixAccordionHeight(rowsBox);
    }
    else App.refresh(); // accordion collapsed — full re-render

    const htStudentEl = document.getElementById("tt-ht-student");
    if(htStudentEl){
      htStudentEl.innerHTML = U.studentsByClass(cls).map(s=>`<option value="${s.id}">${U.esc(s.name)} (${s.reg})</option>`).join("");

  // Renders the existing structured rows (date/day/time/subject) for a
  // class's saved exam timetable, each with inline edit + delete.
  timetableRowsHtml(cls){
    const tt = DB.data.timetables[cls];
    const rows = (tt && tt.rows) || [];
    // Backward-compat: very old timetables only had a freeform "content"
    // text blob (no structured rows) — show that as-is so old data isn't
    // lost, with a note to re-enter it in the new structured format.
    if((!rows || rows.length===0) && tt && tt.content){
      return `<div class="card"><div class="muted" style="font-size:12px; margin-bottom:6px;">⚠️ ഇത് പഴയ ഫോർമാറ്റിലെ ടൈംടേബിൾ ആണ്. പുതിയ structured രീതിയിൽ വീണ്ടും താഴെ ചേർക്കുക:</div>
      <pre style="white-space:pre-wrap; font-family:inherit; font-size:13px; margin:0 0 10px;">${U.esc(tt.content)}</pre>
      <button class="btn-del btn-block" onclick="Sadhar.deleteLegacyTimetable('${cls}')">🗑️ ഈ പഴയ ടൈംടേബിൾ ഡിലീറ്റ് ചെയ്യുക</button></div>`;
    }
    if(rows.length===0){
      return `<p class="muted">ഇതുവരെ പരീക്ഷാ ദിവസങ്ങൾ ഒന്നും ചേർത്തിട്ടില്ല</p>`;
    }
    const sorted = rows.slice().sort((a,b)=> (a.date||"").localeCompare(b.date||""));
    return `<div class="card">
      <table style="width:100%; font-size:13px;">
        <tr><th>തീയതി</th><th>ദിവസം</th><th>സമയം</th><th>വിഷയം</th><th></th></tr>
        ${sorted.map(r=>`<tr>
          <td>${U.displayDateFromStr(r.date)}</td>
          <td>${U.esc(r.day||"")}</td>
          <td>${U.esc(r.time||"")}</td>
          <td>${U.esc(r.subject||"")}</td>
          <td style="white-space:nowrap;">
            <button class="btn-edit" style="font-size:11px;padding:4px 8px;" onclick="Sadhar.editTimetableRow('${cls}','${r.id}')">✏️</button>
            <button class="btn-del" style="font-size:11px;padding:4px 8px;" onclick="Sadhar.deleteTimetableRow('${cls}','${r.id}')">🗑️</button>
          </td>
        </tr>`).join("")}
      </table>
      <div id="tt-edit-box-${cls}"></div>
    </div>`;
  },

  // Opens an inline edit form for one timetable row (date/time/subject),
  // so a mistake can be corrected without deleting and re-adding it.
  editTimetableRow(cls, rowId){
    const tt = DB.data.timetables[cls];

    const box = document.getElementById(`tt-edit-box-${cls}`);
    box.innerHTML = `<div class="card" style="margin-top:10px; background:var(--bg2);">
      <div class="card-title" style="font-size:13px;">തിരുത്തുക</div>
      <div class="form-group"><label>തീയതി</label><input type="date" id="tt-edit-date" value="${row.date}"></div>
      <div class="form-group"><label>സമയം</label><input type="text" id="tt-edit-time" value="${U.esc(row.time||'')}"></div>
      <div class="form-group"><label>വിഷയം</label><input type="text" id="tt-edit-subject" value="${U.esc(row.subject||'')}"></div>
      <div style="display:flex; gap:8px;">
        <button class="primary-btn" style="flex:1;" onclick="Sadhar.saveTimetableRowEdit('${cls}','${rowId}')">സേവ് ചെയ്യുക</button>
        <button class="outline-btn" style="flex:1;" onclick="document.getElementById('tt-edit-box-${cls}').innerHTML=''">റദ്ദാക്കുക</button>
      </div>
    </div>`;
  },

  saveTimetableRowEdit(cls, rowId){
    const tt = DB.data.timetables[cls];
    const row = tt && tt.rows && tt.rows.find(r=>r.id===rowId);
    if(!row) return;
    const date = document.getElementById("tt-edit-date").value;
    const time = document.getElementById("tt-edit-time").value.trim();
    const subject = document.getElementById("tt-edit-subject").value.trim();

    row.date = date;
    row.day = U.weekdayName(date);
    row.time = time;
    row.subject = subject;
    DB.save();
    document.getElementById(`tt-edit-box-${cls}`).innerHTML = "";
    const rowsBoxEdit = document.getElementById("tt-rows-box");
    rowsBoxEdit.innerHTML = this.timetableRowsHtml(cls);
    const statusElA = document.getElementById("tt-exam-status"); if(statusElA) statusElA.innerHTML = this.examStatusBadgeHtml(DB.data.timetables[cls]);
    U.fixAccordionHeight(rowsBoxEdit);
    U.toast("തിരുത്തി സേവ് ചെയ്തു ✓ — രക്ഷിതാക്കളുടെയും ഉസ്താദുമാരുടെയും പാനലിൽ പുതുക്കിയ വിവരം കാണാം");
  },

  saveExamName(){

    const examName = document.getElementById("tt-exam-name").value.trim();
    if(!DB.data.timetables[cls]) DB.data.timetables[cls] = { examName: "", rows: [] };

    U.toast("പരീക്ഷയുടെ പേര് സേവ് ചെയ്തു");

  addTimetableRow(){
    const cls = document.getElementById("tt-class").value;
    const date = document.getElementById("tt-new-date").value;
    const time = document.getElementById("tt-new-time").value.trim();
    const subject = document.getElementById("tt-new-subject").value.trim();
    if(!date || !time || !subject){
      U.toast("തീയതി, സമയം, വിഷയം മൂന്നും നൽകുക");
      return;
    }
    const examName = document.getElementById("tt-exam-name").value.trim();
    if(!DB.data.timetables[cls]) DB.data.timetables[cls] = { examName: "", rows: [] };
    if(!DB.data.timetables[cls].rows) DB.data.timetables[cls].rows = [];
    if(examName) DB.data.timetables[cls].examName = examName;
    // Day name is computed automatically from the date, so there's no
    // separate day field to type — this avoids a date/day mismatch typo.
    const day = U.weekdayName(date);
    DB.data.timetables[cls].rows.push({ id: U.uid("TT"), date, day, time, subject });
    DB.save();
    document.getElementById("tt-new-date").value = "";
    document.getElementById("tt-new-time").value = "";
    document.getElementById("tt-new-subject").value = "";
    const rowBox = document.getElementById("tt-rows-box");
    if(rowBox){
      rowBox.innerHTML = this.timetableRowsHtml(cls);
      const statusElB = document.getElementById("tt-exam-status"); if(statusElB) statusElB.innerHTML = this.examStatusBadgeHtml(DB.data.timetables[cls]);
      U.fixAccordionHeight(rowBox);
    }
    U.toast("✅ ചേർത്തു!");
  },

  deleteTimetableRow(cls, rowId){
    const tt = DB.data.timetables[cls];
    if(!tt || !tt.rows){ U.toast("ടൈംടേബിൾ കണ്ടെത്തിയില്ല"); return; }
    const idx = tt.rows.findIndex(r => String(r.id) === String(rowId));
    if(idx < 0){ U.toast("Row കണ്ടെത്തിയില്ല"); return; }
    tt.rows.splice(idx, 1);
    DB.save(); // saves to localStorage + pushes to cloud
    const box = document.getElementById("tt-rows-box");
    if(box){
      box.innerHTML = this.timetableRowsHtml(cls);
      const statusElC = document.getElementById("tt-exam-status"); if(statusElC) statusElC.innerHTML = this.examStatusBadgeHtml(DB.data.timetables[cls]);
      U.fixAccordionHeight(box);
    } else {
      App.refresh();
    }
    U.toast("🗑️ ഡിലീറ്റ് ചെയ്തു!");
  },

  deleteLegacyTimetable(cls){

      App.refresh();
    }

  // Generate timetable as image using Canvas and share via WhatsApp
  sendTimetableAsImage(cls){
    if(!cls) cls = (document.getElementById("tt-class")||{}).value;
    if(!cls){ U.toast("ക്ലാസ്സ് സെലക്ട് ചെയ്യുക"); return; }
    const tt = DB.data.timetables[cls];
    const rows = (tt && tt.rows && tt.rows.length)
      ? tt.rows.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")) : [];
    if(!rows.length){ U.toast("ടൈംടേബിൾ ഒന്നും ചേർത്തിട്ടില്ല"); return; }
    const examName = (tt && tt.examName) || "പരീക്ഷ";
    const clsLabel = CLASS_LABELS[cls] || cls;

    const canvas = document.createElement("canvas");
    const rowH = 60, headerH = 110, footerH = 40, padding = 20;
    canvas.width = 700;
    canvas.height = headerH + rows.length * rowH + footerH + padding;
    const ctx = canvas.getContext("2d");

    // Background
    ctx.fillStyle = "#0F4C4C";
    ctx.fillRect(0, 0, canvas.width, headerH);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, headerH, canvas.width, canvas.height - headerH);

    // Header text
    ctx.fillStyle = "#C9A84C";
    ctx.font = "bold 22px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്", canvas.width/2, 40);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 18px sans-serif";
    ctx.fillText(examName, canvas.width/2, 70);
    ctx.font = "16px sans-serif";
    ctx.fillText(clsLabel + " — ടൈംടേബിൾ", canvas.width/2, 98);

    // Column headers
    ctx.fillStyle = "#e8f0e8";
    ctx.fillRect(0, headerH, canvas.width, 36);
    ctx.fillStyle = "#0F4C4C";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("തീയതി", 20, headerH + 24);
    ctx.fillText("ദിവസം", 200, headerH + 24);
    ctx.fillText("സമയം", 320, headerH + 24);
    ctx.fillText("വിഷയം", 490, headerH + 24);

    // Rows
    rows.forEach((r, i)=>{
      const y = headerH + 36 + i * rowH;
      ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#f5faf5";
      ctx.fillRect(0, y, canvas.width, rowH);
      ctx.fillStyle = "#1a5c42";
      ctx.font = "bold 14px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(U.displayDateFromStr(r.date), 20, y + 22);
      ctx.fillStyle = "#333";
      ctx.font = "13px sans-serif";
      ctx.fillText(r.day || "", 200, y + 22);
      ctx.fillText(r.time || "", 320, y + 22);
      ctx.font = "bold 14px sans-serif";
      ctx.fillStyle = "#0F4C4C";
      ctx.fillText(r.subject || "", 490, y + 22);
      // divider
      ctx.strokeStyle = "#e0e0e0";
      ctx.beginPath();
      ctx.moveTo(0, y + rowH - 1);
      ctx.lineTo(canvas.width, y + rowH - 1);
      ctx.stroke();
    });

    // Footer
    const fy = headerH + 36 + rows.length * rowH;
    ctx.fillStyle = "#0F4C4C";
    ctx.fillRect(0, fy, canvas.width, footerH + padding);
    ctx.fillStyle = "#C9A84C";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("ദയവായി കൃത്യസമയത്ത് എത്തുക 🙏", canvas.width/2, fy + 25);

    // Download image
    const link = document.createElement("a");
    link.download = "timetable_" + clsLabel + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    U.toast("📷 Image download ആയി! WhatsApp-ൽ share ചെയ്യൂ");
  },

  // Check if tomorrow has any exam — called on sadhar login
  checkTomorrowExams(){
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = tomorrow.toISOString().split("T")[0];
    const alerts = [];
    CLASS_LIST.forEach(cls=>{
      const tt = DB.data.timetables[cls];
      if(!tt || !tt.rows) return;
      const tomorrowRows = tt.rows.filter(r => r.date === tomorrowStr);
      if(tomorrowRows.length > 0){
        tomorrowRows.forEach(r=>{
          alerts.push({ cls, clsLabel: CLASS_LABELS[cls], subject: r.subject, time: r.time, examName: tt.examName||"പരീക്ഷ" });
        });
      }
    });
    if(alerts.length === 0){
      U.toast("നാളെ ഒരു ക്ലാസ്സിനും പരീക്ഷയില്ല");
      return;
    }
    const msg = "📢 നാളെ " + alerts.map(a => a.clsLabel + " — " + a.subject).join(", ") + " പരീക്ഷ ഉണ്ട്!";
    if(!confirm(msg + "\n\nWhatsApp-ൽ alert അയക്കണോ?")) return;

    // One WhatsApp send per class (via the class group link, using the
    // WhatsApp app already chosen in settings) instead of looping through
    // every student — looping would only actually send to the first
    // student on Android, since opening WhatsApp navigates away from the
    // app each time.
    let html = "";
    alerts.forEach(a=>{
      const waMsg = "📢 *മമ്പഉൽ ഉലൂം മദ്റസ*\n" +
        "നാളത്തെ " + a.examName + " (" + a.clsLabel + "):\n" +
        "📖 " + a.subject + "\n" +
        (a.time ? "🕐 " + a.time + "\n" : "") +
        "\nദയവായി തയ്യാറായി വരുക 🙏";
      const groupLink = DB.data.classGroups && DB.data.classGroups[a.cls] && DB.data.classGroups[a.cls].groupLink;
      if(groupLink){
        html += `<div class="row" style="margin-bottom:6px;">
          <span style="font-size:13px;">${U.esc(a.clsLabel)} — ${U.esc(a.subject)}</span>
          <button class="btn-wa" onclick='U.sendWhatsAppGroup(${JSON.stringify(groupLink)}, ${JSON.stringify(waMsg)})'>📩 ഗ്രൂപ്പിലേക്ക്</button>
        </div>`;
      } else {
        U.studentsByClass(a.cls).forEach(s=>{
          if(s.phone){
            html += `<div class="row" style="margin-bottom:6px;">
              <span style="font-size:13px;">${U.esc(s.name)} (${U.esc(a.clsLabel)})</span>
              <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(waMsg)})'>📩</button>
            </div>`;
          }
        });
      }
    });
    const waList = document.getElementById("tt-wa-list");
    if(waList) waList.innerHTML = html;
    U.toast("✅ താഴെ ഓരോന്നും ടാപ്പ് ചെയ്ത് അയക്കൂ");
  },

  sendTimetableAsText(cls){
    if(!cls) cls = (document.getElementById("tt-class")||{}).value;

    const tt = DB.data.timetables[cls];
    const rows = (tt && tt.rows && tt.rows.length) ? tt.rows.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")) : [];
    if(!rows.length){ U.toast("ടൈംടേബിൾ ഒന്നും ചേർത്തിട്ടില്ല"); return; }
    const examName = (tt && tt.examName) || "പരീക്ഷ";
    const clsLabel = CLASS_LABELS[cls] || cls;
    let msg = "📢 *മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്*\n";
    msg += "*" + examName + " — " + clsLabel + "*\n";

      waList.innerHTML = `<div class="card" style="margin-top:8px;">

  sendExamAlert(){
    const clsSel = document.getElementById("tt-class");
    if(!clsSel){ U.toast("ക്ലാസ്സ് സെലക്ട് ചെയ്യുക"); return; }
    const cls = clsSel.value;
    const tt = DB.data.timetables[cls];
    if(!tt || !tt.rows || tt.rows.length===0){
      U.toast("ആദ്യം പരീക്ഷാ ദിവസങ്ങൾ ചേർക്കുക");
      return;
    }
    const sorted = tt.rows.slice().sort((a,b)=> (a.date||"").localeCompare(b.date||""));
    const ttLines = sorted.map(r=>`${U.displayDateFromStr(r.date)} (${r.day}) — ${r.time} — ${r.subject}`).join("\n");
    const groupLink = DB.data.classGroups && DB.data.classGroups[cls] && DB.data.classGroups[cls].groupLink;
    const msg = `ബഹുമാനപ്പെട്ട രക്ഷിതാക്കളേ,\n\n${CLASS_LABELS[cls]} ക്ലാസ്സിലെ "${tt.examName||'പരീക്ഷ'}" സമയവിവരപ്പട്ടിക:\n\n${ttLines}\n\nകുട്ടികൾ നന്നായി തയ്യാറെടുക്കാൻ ശ്രദ്ധിക്കണം. നന്ദി - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;

    if(groupLink){
      U.sendWhatsAppGroup(groupLink, msg);
      document.getElementById("tt-wa-list").innerHTML = "";

    // No group link for this class yet — fall back to per-student list
    const students = U.studentsByClass(cls);

    students.forEach(s => {
      html += `<div class="row" style="margin-bottom:6px;">
        <span style="font-size:13px;">${U.esc(s.name)} (${s.reg})</span>
        <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msg)})'>📩</button>

    U.toast("അലേർട്ട് സന്ദേശം തയ്യാറായി");

  deleteStudent(id){
    if(!confirm("ഈ കുട്ടിയെ പൂർണ്ണമായി നീക്കം ചെയ്യണോ?")) return;
    const idx = DB.data.students.findIndex(s=>s.id===id);
    if(idx>-1) DB.data.students.splice(idx,1);
    if(!DB.data.deletedStudentIds) DB.data.deletedStudentIds = [];
    if(!DB.data.deletedStudentIds.includes(id)) DB.data.deletedStudentIds.push(id);
    DB.save();
    U.toast("കുട്ടിയെ നീക്കം ചെയ്തു");
    App.refresh();
  },

  addStaff(){
    const name = document.getElementById("new-staff-name").value.trim();
    const role = document.getElementById("new-staff-role").value;
    const phone = document.getElementById("new-staff-phone").value.trim();
    const username = document.getElementById("new-staff-username").value.trim();
    const password = document.getElementById("new-staff-password").value.trim();
    if(!name || !username || !password){
      U.toast("പേര്, യൂസർനെയിം, പാസ്‌വേർഡ് നൽകുക");
      return;
    }
    if(DB.data.auth.staff.some(s=>s.username===username) || username===DB.data.auth.sadhar.username){
      U.toast("ഈ യൂസർനെയിം നിലവിലുണ്ട്");
      return;
    }
    const classes = Array.from(document.querySelectorAll("#new-staff-classes input:checked")).map(c=>c.value);
    const newStaff = { id: U.uid("STAFF"), name, role, phone, username, password, classes, photo:"" };

    const fileInput = document.getElementById("new-staff-photo");
    const finishAdd = () => {
      DB.data.auth.staff.push(newStaff);
      // A class can only have ONE class-teacher. If this new teacher is
      // taking over a class that used to belong to someone else, remove
      // it from that other teacher's list — otherwise both teachers end
      // up listing the same class, and every screen that looks up "the"
      // class teacher (parent panel, complaint routing, etc.) just picks
      // whichever one happens to appear first, usually the older one —
      // which is exactly why a newly assigned teacher wasn't showing up.
      this.reassignClassesExclusively(classes, newStaff.id);
      DB.save();
      U.toast("ജീവനക്കാരനെ ചേർത്തു");
      U.clearPhotoRecovery();
      App.refresh();
    };
    if(fileInput.files[0]){
      U.readPhotoFile(fileInput.files[0], (data64)=>{ newStaff.photo = data64; DB.pushPhoto(newStaff.id, data64); finishAdd(); });
    } else {
      finishAdd();
    }
  },

  // Ensures a class is assigned to only one teacher at a time. Removes
  // the given classes from every OTHER teacher's class list, so a class
  // handed to a new teacher doesn't stay silently listed under the
  // previous teacher too.
  reassignClassesExclusively(classes, ownerId){
    if(!classes || !classes.length) return;
    DB.data.auth.staff.forEach(st=>{
      if(st.id === ownerId || !st.classes || !st.classes.length) return;
      st.classes = st.classes.filter(c=>!classes.includes(c));
    });
  },

      </div>
      <div class="form-group"><label>ഫോൺ നമ്പർ</label><input type="text" id="es-phone-${id}" value="${U.esc(st.phone)}"></div>
      <div class="form-group"><label>യൂസർനെയിം</label><input type="text" id="es-username-${id}" value="${U.esc(st.username)}"></div>

      <div class="form-group"><label>ക്ലാസ്സുകൾ</label>
        <div class="chip-grid">
          ${CLASS_LIST.map(c=>`<label class="chip ${st.classes&&st.classes.includes(c)?'checked':''}"><input type="checkbox" value="${c}" ${st.classes&&st.classes.includes(c)?'checked':''} onclick="this.parentElement.classList.toggle('checked')" class="es-cls-${id}">${CLASS_LABELS[c]}</label>`).join("")}
        </div>
      </div>
      <div class="form-group"><label>ഫോട്ടോ</label><input type="file" accept="image/*" id="es-photo-${id}" onclick="U.armPhotoRecovery('sadhar-staff','editStaff','${id}')"></div>
      <button class="primary-btn" onclick="Sadhar.saveStaff('${id}')">സേവ് ചെയ്യുക</button>
    `;
  },

  saveStaff(id){
    const st = DB.data.auth.staff.find(s=>s.id===id);
    st.name = document.getElementById(`es-name-${id}`).value.trim();
    st.role = document.getElementById(`es-role-${id}`).value;
    st.phone = document.getElementById(`es-phone-${id}`).value.trim();
    st.username = document.getElementById(`es-username-${id}`).value.trim();
    st.password = document.getElementById(`es-password-${id}`).value.trim();
    st.classes = Array.from(document.querySelectorAll(`.es-cls-${id}:checked`)).map(c=>c.value);
    this.reassignClassesExclusively(st.classes, id);
    const fileInput = document.getElementById(`es-photo-${id}`);
    const finish = ()=>{
      DB.save();
      U.toast("ജീവനക്കാരുടെ വിവരം സേവ് ചെയ്തു");
      App.refresh();
    };
    if(fileInput.files[0]){
      U.readPhotoFile(fileInput.files[0], (data64)=>{ st.photo=data64; DB.pushPhoto(st.id, data64); finish(); });
    } else finish();
  },

  deleteStaff(id){
    if(!confirm("ഈ ജീവനക്കാരനെ നീക്കം ചെയ്യണോ?")) return;
    const idx = DB.data.auth.staff.findIndex(s=>s.id===id);
    if(idx>-1) DB.data.auth.staff.splice(idx,1);
    if(!DB.data.auth.deletedStaffIds) DB.data.auth.deletedStaffIds = [];
    if(!DB.data.auth.deletedStaffIds.includes(id)) DB.data.auth.deletedStaffIds.push(id);
    DB.save();
    U.toast("നീക്കം ചെയ്തു");
    App.refresh();
  },

  // ---------- Announcements ----------
  renderAnnounce(){
    let html = `<h2 style="margin-bottom:14px;">പൊതു അറിയിപ്പുകൾ (Announcements)</h2>`;
    html += `<div class="card">
      <div class="form-group"><label>അറിയിപ്പ് / സന്ദേശം (ടൈപ്പ് ചെയ്യുക)</label>
        <textarea id="ann-text" placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>
      </div>
      <div class="form-group">
        <label>📎 ഫോട്ടോ / ഓഡിയോ / വീഡിയോ (ഐച്ഛികം)</label>
        <input type="file" id="ann-media" accept="image/*,audio/*,video/*">
        <div class="muted" style="margin-top:4px; font-size:12px;">⚠️ ഫോട്ടോ/ഓഡിയോ/വീഡിയോ ആപ്പിൽ കാണിക്കും. WhatsApp-ൽ text message ആദ്യം send ചെയ്ത ശേഷം media manually share ചെയ്യാം.</div>
      </div>
      <div class="form-group"><label>ലക്ഷ്യം (Target)</label>
        <select id="ann-target">
          <option value="all">എല്ലാ കുട്ടികളും (All Students)</option>
          <option value="1">ഷിഫ്റ്റ് 1</option>
          <option value="2">ഷിഫ്റ്റ് 2</option>
          <option value="3">ഷിഫ്റ്റ് 3</option>
        </select>
      </div>
      <button class="primary-btn" onclick="Sadhar.publishAnnouncement()">പ്രസിദ്ധീകരിക്കുക</button>
    </div>`;

    html += `<div class="section-title">പ്രസിദ്ധീകരിച്ച അറിയിപ്പുകൾ</div>`;
    const anns = DB.data.announcements.slice().reverse();
    anns.forEach(a => {
      let targetLabel = a.target === "all" ? "എല്ലാവരും" : `ഷിഫ്റ്റ് ${a.target}`;
      let mediaHtml = "";
      if(a.mediaType && a.mediaData){
        if(a.mediaType.startsWith("image/")){
          mediaHtml = `<img src="${a.mediaData}" style="max-width:100%;border-radius:8px;margin-bottom:8px;">`;
        } else if(a.mediaType.startsWith("audio/")){
          mediaHtml = `<audio controls style="width:100%;margin-bottom:8px;"><source src="${a.mediaData}" type="${a.mediaType}"></audio>`;
        } else if(a.mediaType.startsWith("video/")){
          mediaHtml = `<video controls style="max-width:100%;border-radius:8px;margin-bottom:8px;"><source src="${a.mediaData}" type="${a.mediaType}"></video>`;
        }
      }
      html += `<div class="card">
        <div class="row"><span class="pill">${targetLabel}</span><span class="muted">${a.date}</span></div>
        <p style="margin:8px 0 10px;">${U.esc(a.text)}</p>
        ${mediaHtml}
        <button class="btn-wa" onclick="Sadhar.sendBroadcast('${a.id}')">📩 WhatsApp അയക്കാൻ ലിസ്റ്റ് കാണുക</button>
        <div id="bc-list-${a.id}"></div>
        <div style="margin-top:8px;"><button class="btn-del" onclick="Sadhar.deleteAnnouncement('${a.id}')">നീക്കം ചെയ്യുക</button></div>
      </div>`;
    });
    if(anns.length===0){
      html += `<div class="empty-state"><div class="emoji">📢</div>ഇതുവരെ അറിയിപ്പുകൾ ഇല്ല</div>`;
    }
    return html;
  },

  publishAnnouncement(){
    const text = document.getElementById("ann-text").value.trim();
    const target = document.getElementById("ann-target").value;
    if(!text){ U.toast("അറിയിപ്പ് ടൈപ്പ് ചെയ്യുക"); return; }
    const mediaInput = document.getElementById("ann-media");
    const file = mediaInput && mediaInput.files[0];
    const doSave = (mediaData, mediaType) => {
      const ann = { id: U.uid("ANN"), text, target, date: U.todayDisplay() };
      if(mediaData){ ann.mediaData = mediaData; ann.mediaType = mediaType; }
      DB.data.announcements.push(ann);
      DB.save();
      U.toast("അറിയിപ്പ് പ്രസിദ്ധീകരിച്ചു");
      App.refresh();
    };
    if(file){
      U.readImageFile(file, (data64) => doSave(data64, file.type));
    } else {
      doSave(null, null);
    }
  },

  deleteAnnouncement(id){
    const idx = DB.data.announcements.findIndex(a=>a.id===id);
    if(idx>-1) DB.data.announcements.splice(idx,1);
    DB.save();
    App.refresh();
  },

  sendBroadcast(id){
    const ann = DB.data.announcements.find(a=>a.id===id);
    if(!ann) return;

    let targetClasses = [];
    if(ann.target === "all"){
      targetClasses = CLASS_LIST.slice();
    } else {
      targetClasses = (DB.data.shifts[ann.target] && DB.data.shifts[ann.target].classes) || [];
    }

    const box = document.getElementById("bc-list-"+id);
    if(box.innerHTML !== ""){ box.innerHTML=""; return; }

    const msg = `അറിയിപ്പ് - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്:\n${ann.text}`;

    // One button per CLASS group — sends the whole class's parents at
    // once via that class's WhatsApp group, instead of going parent by
    // parent. Falls back to a manual share if a class has no group link
    // saved yet.
    let html = `<div class="divider"></div>`;
    targetClasses.forEach(cls=>{
      const groupLink = DB.data.classGroups && DB.data.classGroups[cls] && DB.data.classGroups[cls].groupLink;
      html += `<div class="row" style="margin-bottom:6px;">
        <span style="font-size:13px;">${CLASS_LABELS[cls]||cls}</span>
        ${groupLink
          ? `<button class="btn-wa" onclick='U.sendWhatsAppGroup(${JSON.stringify(groupLink)}, ${JSON.stringify(msg)})'>📩 ഗ്രൂപ്പിലേക്ക് അയക്കുക</button>`
          : `<span class="muted" style="font-size:12px;">ഗ്രൂപ്പ് ലിങ്ക് ചേർത്തിട്ടില്ല</span>`}
      </div>`;
    });
    if(targetClasses.length===0) html += `<p class="muted">ക്ലാസ്സുകൾ കണ്ടെത്തിയില്ല</p>`;
    box.innerHTML = html;
  },

  // ---------- Complaints view ----------
  renderComplaints(){
    let html = `<h2 style="margin-bottom:14px;">രക്ഷിതാക്കളുടെ പരാതികൾ (Complaints)</h2>`;
    const list = DB.data.complaints.toSadhar.slice().reverse();
    list.forEach(c=>{
      const student = U.studentByReg(c.studentReg);
      html += `<div class="card">
        <div class="row"><span class="card-title" style="margin-bottom:0;">${student?U.esc(student.name):'അജ്ഞാതൻ'} (${c.studentReg})</span><span class="muted">${c.date}</span></div>
        <p style="margin-top:8px;">${U.esc(c.text)}</p>
      </div>`;
    });
    if(list.length===0){
      html += `<div class="empty-state"><div class="emoji">💬</div>ഇതുവരെ പരാതികൾ ലഭിച്ചിട്ടില്ല</div>`;
    }
    return html;
  }
};

const Teacher = {

  // ---------- Attendance ----------

  // ---------- Review box ----------
  renderReview(){
    let html = `<h2 style="margin-bottom:14px;">കുട്ടികളുടെ പേഴ്‌സണൽ റിവ്യൂ (Student Review)</h2>`;
    html += `<div class="card">
      <div class="form-group">
        <label>കുട്ടിയുടെ രജിസ്റ്റർ നമ്പർ</label>
        <input type="text" id="rev-reg" inputmode="numeric" oninput="Teacher.lookupReviewStudent()" placeholder="ഉദാ: 691">
      </div>
      <div id="rev-student-info"></div>
    </div>`;

    // Recently sent reviews by this teacher (for their classes), with delete option
    const myClasses = this.myClasses();
    const myReviews = DB.data.reviews.filter(r=>{
      const st = U.studentByReg(r.studentReg);
      return st && myClasses.includes(st.cls);
    }).slice().reverse().slice(0,10);

    if(myReviews.length){
      html += `<div class="section-title">അടുത്തിടെ അയച്ച റിവ്യൂകൾ</div>`;
      myReviews.forEach(r=>{
        const st = U.studentByReg(r.studentReg);
        html += `<div class="card">
          <div class="row"><span class="card-title" style="margin-bottom:0;">${st?U.esc(st.name):'അജ്ഞാതൻ'} (${r.studentReg})</span><span class="muted">${r.date}</span></div>
          <p style="margin:8px 0;">${U.esc(r.text)}</p>
          <button class="btn-del" onclick="Teacher.deleteReview('${r.id}')">ഡിലീറ്റ് ചെയ്യുക</button>
        </div>`;
      });

    return html;
  },

  deleteReview(id){
    const idx = DB.data.reviews.findIndex(r=>r.id===id);
    if(idx>-1) DB.data.reviews.splice(idx,1);
    DB.save();
    U.toast("നീക്കം ചെയ്തു");
    App.refresh();
  },

  lookupReviewStudent(){
    const reg = document.getElementById("rev-reg").value.trim();
    const infoBox = document.getElementById("rev-student-info");
    if(!reg){ infoBox.innerHTML=""; return; }
    const s = U.studentByReg(reg);
    if(!s){
      infoBox.innerHTML = `<p class="muted" style="margin-top:8px;">കുട്ടിയെ കണ്ടെത്താനായില്ല</p>`;
      return;
    }
    // Only allow reviewing students in THIS teacher's own assigned
    // classes — a teacher should not be able to access or send reviews
    // for students in another teacher's class.
    const myClasses = App.user.classes || [];
    if(!myClasses.includes(s.cls)){
      infoBox.innerHTML = `<p style="margin-top:8px; color:var(--rose); font-weight:600;">⚠️ ${U.esc(s.name)} (${CLASS_LABELS[s.cls]||s.cls}) നിങ്ങളുടെ ക്ലാസ്സിലെ കുട്ടി അല്ല. നിങ്ങളുടെ ക്ലാസ്സിലെ കുട്ടിയുടെ Reg No നൽകുക.</p>`;
      return;
    }
    infoBox.innerHTML = `
      <div class="divider"></div>
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label>നിർദ്ദേശം / അഭിപ്രായം (ടൈപ്പ് ചെയ്യുക)</label>
        <textarea id="rev-text" placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>
      </div>
      <button class="primary-btn btn-block" onclick="Teacher.sendReview('${s.id}')">📩 രക്ഷിതാവിന് അയക്കുക</button>
    `;
  },

  sendReview(studentId){
    const text = document.getElementById("rev-text").value.trim();
    if(!text){ U.toast("നിർദ്ദേശം ടൈപ്പ് ചെയ്യുക"); return; }
    const s = U.studentById(studentId);
    const teacherName = App.user.name || "അധ്യാപകൻ";
    const msg = `പ്രിയ രക്ഷിതാവേ, ${s.name} (${CLASS_LABELS[s.cls]}, Reg No: ${s.reg}) സംബന്ധിച്ച് ${teacherName}-ന്റെ നിർദ്ദേശം:\n\n"${text}"\n\n- മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;

    const review = { id: U.uid("REV"), studentReg: s.reg, text, date: U.todayDisplay(), from: teacherName };
    DB.data.reviews.push(review);
    DB.save();

    U.sendWhatsApp(s.phone, msg);
    U.toast("നിർദ്ദേശം അയച്ചു");
    const ti = document.getElementById("rev-text");
    if(ti) ti.value = "";

    // Results entry
    html += `<div class="card">
      <div class="card-title">പരീക്ഷാ മാർക്ക് രേഖപ്പെടുത്തൽ (Enter Results)</div>

        </select>
      </div>

  loadResultEntry(){
    const cls = document.getElementById("res-class").value;
    const exam = document.getElementById("res-exam").value.trim();
    const subjectsStr = document.getElementById("res-subjects").value.trim();
    const area = document.getElementById("res-entry-area");
    if(!exam || !subjectsStr){ area.innerHTML=""; return; }
    const subjects = subjectsStr.split(",").map(s=>s.trim()).filter(Boolean);
    const students = U.studentsByClass(cls);

    const existing = (DB.data.results[exam] && DB.data.results[exam][cls]) || {};

    let html = `<div class="divider"></div>`;
    students.forEach(s=>{
      const marks = existing[s.reg] ? existing[s.reg].subjects : {};
      html += `<div style="margin-bottom:10px;">
        <div style="font-weight:700; font-size:13px; margin-bottom:6px;">${U.esc(s.name)} (${s.reg})</div>
        <div class="chip-grid">
          ${subjects.map(sub=>`<div style="display:flex; flex-direction:column; gap:3px;">
            <label class="muted" style="font-size:11px;">${U.esc(sub)}</label>
            <input type="number" style="width:70px; padding:6px;" id="mark-${s.reg}-${sub.replace(/\s/g,'_')}" value="${marks[sub]!==undefined?marks[sub]:''}">
          </div>`).join("")}
        </div>
      </div>`;
    });
    html += `<button class="primary-btn" onclick="Teacher.saveResults('${cls}', ${JSON.stringify(exam)}, ${JSON.stringify(subjects)})">മാർക്ക് സേവ് ചെയ്ത് റാങ്ക് കണക്കാക്കുക</button>`;
    area.innerHTML = html;
  },

  saveResults(cls, exam, subjects){
    const students = U.studentsByClass(cls);
    if(!DB.data.results[exam]) DB.data.results[exam] = {};
    const classResults = {};

    students.forEach(s=>{
      const subjMarks = {};
      let total = 0;
      subjects.forEach(sub=>{
        const val = parseFloat(document.getElementById(`mark-${s.reg}-${sub.replace(/\s/g,'_')}`).value) || 0;
        subjMarks[sub] = val;
        total += val;
      });
      classResults[s.reg] = { subjects: subjMarks, total };
    });

    // compute ranks
    const sorted = Object.entries(classResults).sort((a,b)=>b[1].total - a[1].total);
    sorted.forEach(([reg, r], idx)=>{ r.rank = idx+1; });

    DB.data.results[exam][cls] = classResults;
    DB.save();
    U.toast("മാർക്കും റാങ്കും സേവ് ചെയ്തു");
  },

  viewTimetable(){
    const cls = document.getElementById("tv-class").value;
    const tt = DB.data.timetables[cls];
    const box = document.getElementById("tv-content");
    box.innerHTML = `<div class="divider"></div>` + U.timetableTableHtml(tt);
  },

  // ---------- Monthly attendance summary ----------
  renderMonthly(){
    let html = `<h2 style="margin-bottom:14px;">📅 മാസം തിരിച്ചുള്ള ഹാജർ സംഗ്രഹം</h2>`;
    html += `<button class="outline-btn btn-block" style="margin-bottom:12px;" onclick="App.goTo('teacher-attendance')">← ഹാജർ പുസ്തകത്തിലേക്ക്</button>`;

    const classes = this.myClasses();
    if(classes.length === 0) return html;

    html += `<div class="form-group">
      <label>ക്ലാസ്സ്</label>
      <select id="mon-class" onchange="App.refresh()">
        ${classes.map(c=>`<option value="${c}" ${Teacher._monClass===c?'selected':''}>${CLASS_LABELS[c]}</option>`).join("")}
      </select>
    </div>`;

    const selClass = document.getElementById("mon-class") ? document.getElementById("mon-class").value : classes[0];
    Teacher._monClass = selClass;

    html += `<div class="form-group">
      <label>മാസം</label>
      <select id="mon-month" onchange="App.refresh()">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${Teacher._monMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;

    const selMonth = document.getElementById("mon-month") ? document.getElementById("mon-month").value : ACADEMIC_MONTHS[0].key;
    Teacher._monMonth = selMonth;

    const dates = U.datesInMonth(selMonth);
    if(dates.length === 0){
      html += `<div class="empty-state"><div class="emoji">📅</div>ഈ മാസം ഇതുവരെ ആരംഭിച്ചിട്ടില്ല</div>`;
      return html;
    }

    // Holiday dates for this class's shift in this month
    const holidayDates = dates.filter(d=>U.isHolidayForClass(d, selClass));
    if(holidayDates.length){
      html += `<div class="card">
        <div class="card-title">ഈ മാസത്തെ അവധി ദിവസങ്ങൾ</div>
        ${holidayDates.map(d=>{
          const h = (DB.data.holidayLog||[]).find(x=>x.date===d && (x.target==='all' || parseInt(x.target)===U.classShift(selClass)));
          return `<div class="row" style="font-size:13px;"><span>${U.displayDateFromStr(d)}</span><span class="muted">${h?U.esc(h.reason):''}</span></div>`;
        }).join("")}
      </div>`;
    }

    const students = U.studentsByClass(selClass);
    const workingDates = dates.filter(d=>!holidayDates.includes(d));

    html += `<div class="card">
      <div class="card-title">${CLASS_LABELS[selClass]} — ${ACADEMIC_MONTHS.find(m=>m.key===selMonth).label}</div>
      <div class="muted" style="margin-bottom:8px;">പ്രവർത്തി ദിവസങ്ങൾ: ${workingDates.length}</div>
      <table style="width:100%; font-size:12.5px;">
        <tr><th style="text-align:right;">കുട്ടി</th><th>ഹാജർ</th><th>അസാന്നിധ്യം</th><th>രേഖപ്പെടുത്താത്തത്</th></tr>
        ${students.map(s=>{
          let present=0, absent=0, none=0;
          workingDates.forEach(d=>{
            const status = (DB.data.attendance[d]||{})[s.id];
            if(status==='present') present++;
            else if(status==='absent') absent++;
            else none++;
          });
          return `<tr>
            <td style="text-align:right;">${U.esc(s.name)} <span class="muted">(${s.reg})</span></td>
            <td style="text-align:center; color:var(--moss); font-weight:700;">${present}</td>
            <td style="text-align:center; color:var(--rose); font-weight:700;">${absent}</td>
            <td style="text-align:center; color:#aaa;">${none}</td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;

    return html;
  },

  // ---------- Monthly Attendance Summary ----------
  renderMonthly(){
    const classes = this.myClasses();
    const allDates = Object.keys(DB.data.attendance).sort();
    const monthsPresent = {};
    allDates.forEach(d=>{ const m=d.slice(0,7); monthsPresent[m]=true; });
    const availMonths = Object.keys(monthsPresent).sort();

    let selMonth = Teacher._selMonth || (availMonths.length ? availMonths[availMonths.length-1] : "");
    if(!selMonth && ACADEMIC_MONTHS.length) selMonth = ACADEMIC_MONTHS[0].key;

    let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <button class="outline-btn" onclick="App.goTo('teacher-attendance')">← തിരികെ</button>
      <h2>📅 മാസം തിരിച്ചുള്ള ഹാജർ</h2>
    </div>`;

    html += `<div class="form-group">
      <label>മാസം തിരഞ്ഞെടുക്കുക</label>
      <select id="monthly-month" onchange="Teacher._selMonth=this.value; App.goTo('teacher-monthly')">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${selMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;

    if(!selMonth){ html += `<p class="muted">ഈ മാസത്തിലെ ഹാജർ ഡേറ്റ ഇല്ല</p>`; return html; }

    const curVal = document.getElementById("monthly-month");
    const theMonth = (curVal ? curVal.value : selMonth) || selMonth;
    Teacher._selMonth = theMonth;

    // Get all dates in this month that have attendance data
    const monthDates = allDates.filter(d=>d.startsWith(theMonth)).sort();

    html += `<div class="card">
      <div class="card-title">ഹാജർ ഉള്ള ദിവസങ്ങൾ: ${monthDates.length}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
        ${monthDates.map(d=>`<span class="pill">${U.displayDateFromStr(d)}</span>`).join("") || '<span class="muted">ഡേറ്റ ഇല്ല</span>'}
      </div>
    </div>`;

    // Per-class summary
    classes.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(!students.length) return;

      html += `<div class="card">
        <div class="card-title">${CLASS_LABELS[cls]}</div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          <tr style="text-align:center;border-bottom:1px solid var(--line);">
            <th style="text-align:left;padding:6px 4px;">കുട്ടി</th>
            <th style="padding:6px 4px;">ഹാജർ</th>
            <th style="padding:6px 4px;">അസാന്നിധ്യം</th>
            <th style="padding:6px 4px;">-</th>
          </tr>`;

      students.forEach(s=>{
        let p=0, ab=0, blank=0;
        monthDates.forEach(d=>{
          const st = (DB.data.attendance[d]||{})[s.id];
          if(st==='present') p++;
          else if(st==='absent') ab++;
          else blank++;
        });
        html += `<tr style="border-bottom:1px solid #f0ebe0;">
          <td style="padding:6px 4px;">${U.esc(s.name)}<br><span class="muted" style="font-size:11px;">Reg:${s.reg}</span></td>
          <td style="text-align:center;color:var(--moss);font-weight:700;">${p}</td>
          <td style="text-align:center;color:var(--rose);font-weight:700;">${ab}</td>
          <td style="text-align:center;color:#aaa;">${blank}</td>
        </tr>`;
      });
      html += `</table></div>`;
    });

    return html;
  }
};

// ===========================================================
// renderers_committee.js — Committee / Management Panel (View Only)

const Committee = {

  renderDashboard(){
    const data = DB.data;
    const totalStudents = data.students.length;
    const teacherCount = data.auth.staff.filter(s=>s.role==='teacher').length;

    const today = U.todayStr();
    const att = data.attendance[today] || {};
    let present=0, absent=0, notMarked=0;
    data.students.forEach(s=>{
      if(att[s.id]==='present') present++;
      else if(att[s.id]==='absent') absent++;
      else notMarked++;
    });

    let html = `<h2 style="margin-bottom:14px;">നിരീക്ഷണ ഡാഷ്ബോർഡ് (Monitoring Dashboard)</h2>`;
    html += `<div class="stat-grid">
      <div class="stat-card"><div class="num">${totalStudents}</div><div class="label">ആകെ കുട്ടികൾ</div></div>
      <div class="stat-card"><div class="num">${teacherCount}</div><div class="label">അധ്യാപകർ</div></div>
      <div class="stat-card"><div class="num">${present}</div><div class="label">ഇന്ന് ഹാജർ</div></div>
      <div class="stat-card"><div class="num">${absent}</div><div class="label">ഇന്ന് അസാന്നിധ്യം</div></div>
    </div>`;

    html += `<div class="section-title">ഇന്നത്തെ ക്ലാസ്സ് അനുസരിച്ച് ഹാജർ</div>`;
    CLASS_LIST.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(students.length===0) return;
      let p=0, a=0;
      students.forEach(s=>{
        if(att[s.id]==='present') p++;
        else if(att[s.id]==='absent') a++;
      });
      html += `<div class="card">
        <div class="row">
          <span class="card-title" style="margin-bottom:0;">${CLASS_LABELS[cls]}</span>

          </div>
        </div>
      </div>`;
    });

    return html;
  },

  renderFees(){
    const data = DB.data;

    });

      <div class="stat-card"><div class="num">₹${totalCollected}</div><div class="label">പിരിഞ്ഞു കിട്ടിയത്</div></div>
      <div class="stat-card"><div class="num">₹${balance}</div><div class="label">ആകെ ബാക്കി കുടിശ്ശിക</div></div>
    </div>`;

    // Overall payment history — all payments across all classes/students
    // sorted by date (newest first), so management can see day-by-day
    // who paid and when, without having to open each class card separately.
    html += `<button class="outline-btn btn-block" style="margin-bottom:10px;" onclick="Committee.toggleAllPaymentHistory(this)">📋 ഫീസ് ഹിസ്റ്ററി (ദിവസം അനുസരിച്ച്)</button>
    <div id="all-payment-history"></div>`;

    html += `<div class="section-title">ക്ലാസ്സ് അനുസരിച്ച് ഫീസ് നില</div>`;
    CLASS_LIST.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(students.length===0) return;
      let collected=0, expected=0;
      students.forEach(s=>{ collected+=s.paidTotal; expected+=data.fees.annual; });
      html += `<div class="card">
        <div class="row">
          <span class="card-title" style="margin-bottom:0;">${CLASS_LABELS[cls]}</span>
          <span class="muted">${students.length} കുട്ടികൾ</span>
        </div>
        <div class="row" style="margin-top:6px;">
          <span class="muted">പിരിഞ്ഞത്</span><strong>₹${collected}</strong>
        </div>
        <div class="row">
          <span class="muted">ബാക്കി</span><strong style="color:var(--rose);">₹${Math.max(expected-collected,0)}</strong>
        </div>
        <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">
          <button class="primary-btn" style="flex:1; min-width:100px; background:var(--moss); font-size:12px; padding:8px;" onclick="Committee.toggleClassStatusList('${cls}','paid')">✅ അടച്ചവർ</button>
          <button class="primary-btn" style="flex:1; min-width:100px; background:#d4a017; font-size:12px; padding:8px;" onclick="Committee.toggleClassStatusList('${cls}','partial')">🟡 ഭാഗികം</button>
          <button class="primary-btn" style="flex:1; min-width:100px; background:var(--rose); font-size:12px; padding:8px;" onclick="Committee.toggleClassStatusList('${cls}','unpaid')">❌ അടക്കാത്തവർ</button>
        </div>
        <div id="status-list-${cls}"></div>
        <button class="outline-btn btn-block" style="margin-top:8px;" onclick="Committee.toggleMonthlyFee('${cls}')">മാസം തിരിച്ച് കാണുക</button>
        <button class="outline-btn btn-block" style="margin-top:8px;" onclick="Committee.toggleCollectedBy('${cls}')">👤 ആരൊക്കെ ഫീസ് വാങ്ങി എന്ന് കാണുക</button>
        <button class="btn-wa btn-block" style="margin-top:8px;" onclick="FeeShared.remindAllInClass('${cls}')">📩 കുടിശ്ശികക്കാരുടെ രക്ഷിതാക്കൾക്ക് ഓർമ്മിപ്പിക്കൽ അയക്കുക</button>
        <div id="monthly-fee-${cls}"></div>
        <div id="collected-by-${cls}"></div>
      </div>`;
    });

    return html;
  },

  // Lets management toggle between three groups for a class: who has
  // fully paid, who has paid only part, and who hasn't paid anything —
  // so it's clear at a glance who's paid and who hasn't, instead of
  // only a single combined balance number.
  toggleClassStatusList(cls, mode){
    const box = document.getElementById("status-list-"+cls);
    // If already showing this exact mode, tapping again collapses it
    if(box.dataset.mode === mode){ box.innerHTML = ""; box.dataset.mode = ""; return; }
    box.dataset.mode = mode;
    const students = U.studentsByClass(cls);
    const annual = DB.data.fees.annual || 0;
    const withStatus = students.map(s => {
      const paid = s.paidTotal || 0;
      const balance = Math.max(annual - paid, 0);
      let status;
      if(balance <= 0) status = 'paid';
      else if(paid > 0) status = 'partial';
      else status = 'unpaid';
      return { s, paid, balance, status };
    }).filter(x => x.status === mode)
      .sort((a,b) => b.balance - a.balance);

    const titles = { paid: "✅ പൂർണ്ണമായി അടച്ചവർ", partial: "🟡 ഭാഗികമായി അടച്ചവർ", unpaid: "❌ ഒന്നും അടക്കാത്തവർ" };
    const emptyMsgs = {
      paid: "ഇതുവരെ ആരും പൂർണ്ണമായി ഫീസ് അടച്ചിട്ടില്ല",
      partial: "ഭാഗികമായി ഫീസ് അടച്ച കുട്ടികൾ ഇല്ല",
      unpaid: "🎉 എല്ലാവരും എന്തെങ്കിലും ഫീസ് അടച്ചിട്ടുണ്ട്"
    };

    if(!withStatus.length){
      box.innerHTML = `<div class="divider"></div><p class="muted" style="margin-top:6px;">${emptyMsgs[mode]}</p>`;
      return;
    }

    let html = `<div class="divider"></div><div class="card-title" style="font-size:13px;">${titles[mode]} (${withStatus.length})</div>`;
    withStatus.forEach(({s, paid, balance}) => {
      html += `<div class="row" style="font-size:12.5px; padding:4px 0;">
        <span>${U.esc(s.name)} (${s.reg})</span>
        <span>${mode!=='paid' ? `<strong style="color:var(--rose);">₹${balance} ബാക്കി</strong>` : `<strong style="color:var(--moss);">✅</strong>`}</span>
      </div>`;
    });
    box.innerHTML = html;
  },

  // Collects every payment from every student in every class, sorts them
  // newest-first so management can see the day-by-day fee history at a
  // glance without needing to open each class card one by one.
  toggleAllPaymentHistory(btn){
    const box = document.getElementById("all-payment-history");
    if(box.innerHTML !== ""){ box.innerHTML=""; btn.textContent="📋 ഫീസ് ഹിസ്റ്ററി (ദിവസം അനുസരിച്ച്)"; return; }
    btn.textContent = "📋 ഫീസ് ഹിസ്റ്ററി (ദിവസം അനുസരിച്ച്) ▲";

    const all = [];
    DB.data.students.forEach(s=>{
      (s.payments||[]).forEach(p=>{
        all.push({ date: p.date, amount: p.amount, studentName: s.name, cls: s.cls, reg: s.reg });
      });
    });

    if(!all.length){
      box.innerHTML = `<p class="muted" style="margin-bottom:12px;">ഇതുവരെ ഫീസ് പേയ്മെന്റ് ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല</p>`;
      return;
    }

    // Sort by date descending (newest first). Payment dates are stored
    // as "DD/MM/YYYY" (todayDisplay format), so convert to comparable.
    all.sort((a,b)=>{
      const toNum = d => { const [dd,mm,yy]=d.split('/'); return Number(yy+mm+dd); };
      return toNum(b.date) - toNum(a.date);
    });

    // Group by date for easy scanning
    const byDate = {};
    all.forEach(p=>{
      if(!byDate[p.date]) byDate[p.date]=[];
      byDate[p.date].push(p);
    });

    let html = `<div class="card" style="margin-bottom:12px;">`;
    Object.keys(byDate).forEach(date=>{
      const payments = byDate[date];
      const dayTotal = payments.reduce((s,p)=>s+p.amount, 0);
      html += `<div style="font-weight:700; font-size:13px; padding:8px 0 4px; border-bottom:2px solid var(--bg2);">${date} — ₹${dayTotal}</div>`;
      payments.forEach(p=>{
        html += `<div class="row" style="padding:6px 0; border-bottom:1px solid #f0ede8;">
          <span style="flex:1; font-size:13px;">${U.esc(p.studentName)} <span class="muted">(${CLASS_LABELS[p.cls]||p.cls}, Reg: ${p.reg})</span></span>
          <span style="font-weight:700; color:var(--moss);">₹${p.amount}</span>
        </div>`;
      });
    });
    html += `</div>`;
    box.innerHTML = html;
  },

  toggleCollectedBy(cls){
    const box = document.getElementById("collected-by-"+cls);
    if(box.innerHTML !== ""){ box.innerHTML=""; return; }
    const students = U.studentsByClass(cls);
    const allPayments = [];
    students.forEach(s=>{
      (s.payments||[]).forEach(p=>{
        allPayments.push({ studentName: s.name, reg: s.reg, amount: p.amount, date: p.date, collectedBy: p.collectedBy || "അറിയില്ല (പഴയ entry)" });
      });
    });
    if(allPayments.length === 0){
      box.innerHTML = `<div class="divider"></div><p class="muted">ഇതുവരെ ഫീസ് പേയ്മെന്റ് ഒന്നും രേഖപ്പെടുത്തിയിട്ടില്ല</p>`;
      return;
    }
    // Most recent first
    allPayments.reverse();
    box.innerHTML = `<div class="divider"></div>
      <table style="width:100%; font-size:12.5px;">
        <tr><th>കുട്ടി</th><th>തുക</th><th>തീയതി</th><th>വാങ്ങിയത്</th></tr>
        ${allPayments.map(p=>`<tr>
          <td>${U.esc(p.studentName)} (${p.reg})</td>
          <td>₹${p.amount}</td>
          <td>${p.date}</td>
          <td><strong>${U.esc(p.collectedBy)}</strong></td>
        </tr>`).join("")}
      </table>`;
  },

  // Show, for each month, how many students in this class have paid (have that month checked in any payment)
  toggleMonthlyFee(cls){
    const box = document.getElementById("monthly-fee-"+cls);
    if(box.innerHTML !== ""){ box.innerHTML=""; return; }
    const students = U.studentsByClass(cls);
    let html = `<div class="divider"></div>`;
    ACADEMIC_MONTHS.forEach(m=>{
      const paidStudents = students.filter(s=>
        (s.payments||[]).some(p=>(p.months||[]).includes(m.key))
      );
      html += `<div class="row" style="font-size:12.5px; padding:3px 0;">
        <span>${m.label}</span>
        <span class="pill ${paidStudents.length>0?'green':''}">${paidStudents.length} / ${students.length}</span>
      </div>`;
    });
    if(students.some(s=>(s.payments||[]).some(p=>!p.months || p.months.length===0))){
      html += `<p class="muted" style="margin-top:6px;">⚠️ ചില പേയ്മെന്റുകളിൽ മാസം രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
    }
    box.innerHTML = html;
  },

  renderStaff(){
    const data = DB.data;
    let html = `<h2 style="margin-bottom:14px;">അധ്യാപകരുടെ ഹാജർ നില (Staff Attendance)</h2>`;

    const teachers = data.auth.staff.filter(s=>s.role==='teacher');
    if(teachers.length===0){
      html += `<div class="empty-state"><div class="emoji">👨‍🏫</div>അധ്യാപകരെ ഇതുവരെ ചേർത്തിട്ടില്ല</div>`;
      return html;
    }

    const todayStr = U.todayStr();
    html += `<div style="font-weight:700;font-size:15px;margin-bottom:12px;color:var(--moss);">📅 ഇന്നത്തെ ഹാജർ നില — ${U.displayDateFromStr(todayStr)}</div>`;
    teachers.forEach(t=>{
      const allShifts=[1,2,3].filter(sk=>(t.classes||[]).some(c=>U.classShift(c)===sk));
      if(!allShifts.length) return;
      const boxes=allShifts.map(sk=>{
        const status=(data.attendance[todayStr]||{})[U.staffAttKey(t.id,sk)] || (U.teacherTookAttendance(t, sk, todayStr) ? 'present' : undefined);
        const bg=status==='present'?'#e6f9ed':status==='absent'?'#fdecea':'#f5f5f5';
        const border=status==='present'?'#34a853':status==='absent'?'#e53935':'#ccc';
        const icon=status==='present'?'✅ Present':status==='absent'?'❌ Absent':'— ഇല്ല';
        const st=(data.shifts&&data.shifts[sk]&&data.shifts[sk].time)||'';
        return `<div style="flex:1;min-width:85px;background:${bg};border:2px solid ${border};border-radius:10px;padding:8px 4px;text-align:center;">
          <div style="font-weight:700;font-size:12px;">ഷിഫ്റ്റ് ${sk}</div>
          ${st?`<div style="font-size:10px;color:#555;margin:2px 0;">${U.esc(st)}</div>`:''}
          <div style="font-size:11px;font-weight:600;margin-top:4px;">${icon}</div>
        </div>`;
      }).join('');
      html+=`<div class="card" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          ${U.photoOrInitial(t.photo,t.name)}
          <div>
            <div style="font-weight:700;font-size:15px;">${U.esc(t.name)}</div>
            <div class="muted" style="font-size:12px;">${(t.classes||[]).map(c=>CLASS_LABELS[c]).join(', ')}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">${boxes}</div>
      </div>`;
    });
    html+=`<div class="section-title" style="margin-top:16px;">മാസം തിരിച്ചുള്ള ഹാജർ സംഗ്രഹം</div>`;

    // Month selector
    html += `<div class="form-group">
      <label>മാസം</label>
      <select id="staff-att-month" onchange="App.refresh()">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${Committee._staffMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;
    const selMonth = document.getElementById("staff-att-month") ? document.getElementById("staff-att-month").value : ACADEMIC_MONTHS[ACADEMIC_MONTHS.length-1].key;
    Committee._staffMonth = selMonth;
    const monthDates = U.datesInMonth(selMonth);

    teachers.forEach(t=>{
      const teacherShifts = Array.from(new Set((t.classes||[]).map(c=>U.classShift(c)).filter(Boolean)));

      html += `<div class="card">
        <div class="row">
          ${U.photoOrInitial(t.photo, t.name)}
          <div style="flex:1; margin-left:10px;">
            <div class="card-title" style="margin-bottom:2px;">${U.esc(t.name)}</div>
            <div class="muted">${t.classes && t.classes.length ? t.classes.map(c=>CLASS_LABELS[c]).join(", ") : ''}</div>
          </div>
        </div>`;

      if(teacherShifts.length === 0){
        html += `<p class="muted" style="margin-top:8px;">ഷിഫ്റ്റ് നൽകിയിട്ടില്ല</p></div>`;
        return;
      }

      // Show each shift this teacher works in SEPARATELY — a teacher who
      // teaches more than one shift in a day can be absent in one and
      // present in another, so a single blended number wouldn't make
      // sense. Each shift gets its own present/absent count + day list,
      // for the selected month.
      teacherShifts.sort((a,b)=>a-b).forEach(shiftKey=>{
        let present=0, absent=0;
        const records = [];
        monthDates.forEach(date=>{
          const teacherClassesInShift = (t.classes||[]).filter(c => U.classShift(c) === shiftKey);
          const allOnHoliday = teacherClassesInShift.length > 0 && teacherClassesInShift.every(cls => U.isHolidayForClass(date, cls));
          if(allOnHoliday) return;
          const shiftOnHoliday = (data.holidayLog||[]).some(h=>h.date===date && (h.target==='all' || parseInt(h.target)===shiftKey));
          if(shiftOnHoliday) return;
          const status = (data.attendance[date]||{})[U.staffAttKey(t.id, shiftKey)] || (U.teacherTookAttendance(t, shiftKey, date) ? 'present' : undefined);
          if(status === 'present'){ present++; records.push({date, status:'present'}); }
          else if(status === 'absent'){ absent++; records.push({date, status:'absent'}); }
          // if status is undefined (not yet marked, e.g. a future date), don't count it either way
        });

        html += `<div class="divider"></div>
          <div class="card-title" style="font-size:13px;">ഷിഫ്റ്റ് ${shiftKey} — ${U.esc((data.shifts[shiftKey]&&data.shifts[shiftKey].time)||'')}</div>
          <div class="row" style="margin-top:6px;">
            <span class="pill green">Present: ${present}</span>
            <span class="pill red">Absent: ${absent}</span>
          </div>
          ${records.length ? `
          <table style="margin-top:6px;">
            <tr><th>തീയതി</th><th>നില</th></tr>
            ${records.slice(-10).reverse().map(r=>`<tr><td>${U.displayDateFromStr(r.date)}</td><td>${r.status==='present'?'<span class="pill green">Present</span>':'<span class="pill red">Absent</span>'}</td></tr>`).join("")}
          </table>` : `<p class="muted" style="margin-top:6px;">ഈ മാസം ഇതുവരെ രേഖപ്പെടുത്തിയിട്ടില്ല</p>`}`;
      });

      html += `</div>`;
    });

    return html;
  }
};

const Parent = {

  me(){
    return U.studentById(App.user.studentId);
  },

  renderHome(){
    const s = this.me();
    if(!s) return `<div class="empty-state">വിവരം കണ്ടെത്താനായില്ല</div>`;
    let html = `<h2 style="margin-bottom:14px;">ഹോം (Home)</h2>`;

    // Sadhar official board
    const shiftKey = U.classShift(s.cls);
    // Force cloud sync every time parent home loads - no cache.
    // IMPORTANT FIX: only re-render if the parent is STILL on the home tab
    // when the sync finishes. Before, this always force-rendered
    // 'parent-home' regardless of where the parent had since navigated to
    // (e.g. Fee, Result, Staff) — so tapping another tab right after
    // opening the app would get yanked straight back to Home a moment
    // later. Now it checks App.currentTab first.
    if(!window._pSync){
      window._pSync = true;
      DB.syncFromCloud((updated)=>{
        window._pSync = false;
        if(updated){
          U.checkNewNotificationsForStudent(s);
          if(App.currentTab === 'parent-home'){
            const c = document.getElementById('app-container');
            if(c) try{ c.innerHTML = Renderers.render('parent-home'); }catch(e){}
          }
        }
      });
    }
    const holiday = U.shiftHoliday(shiftKey);
    // Also check class-specific holiday for this student's own class.
    // (BUG FIX: this used to read s.classes — that's a teacher/staff field
    // for handling multiple classes. A student belongs to exactly one
    // class, s.cls, so checking s.classes always came up empty and class-
    // specific holidays never reached any parent's screen.)
    const classHolidays = [s.cls].map(cls=>{
      const h = DB.data.holidays["cls_"+cls];
      return (h && h.active) ? {cls, reason:h.reason} : null;
    }).filter(Boolean);

    if(holiday){
      html += `<div class="holiday-banner">
        <div class="big">ഇന്ന് അവധിയാണ്!</div>
        <div class="reason">കാരണം: ${U.esc(holiday.reason)}</div>
      </div>`;
    }
    if(classHolidays.length){
      classHolidays.forEach(ch=>{
        html += `<div class="holiday-banner">
          <div class="big">🏫 ${U.esc(ch.cls)} — ഇന്ന് അവധി</div>
          <div class="reason">കാരണം: ${U.esc(ch.reason)}</div>
        </div>`;
      });
    }

    // announcements — only show TODAY's, so they automatically disappear
    // the next day without the sadhar needing to manually delete them.
    // (Sadhar's own "published announcements" list still shows full
    // history, for managing/deleting older ones.)
    const todayDisp = U.todayDisplay();
    const anns = DB.data.announcements.filter(a=>{
      if(a.date !== todayDisp) return false;
      if(a.target==='all') return true;
      return DB.data.shifts[a.target].classes.includes(s.cls);
    }).slice().reverse();

    if(anns.length){
      html += `<div class="card">
        <div class="card-title">സദറിന്റെ അറിയിപ്പുകൾ</div>
        ${anns.map(a=>`<div style="margin-bottom:10px;">
          <span class="pill">${a.target==='all'?'എല്ലാവർക്കും':'ഷിഫ്റ്റ് '+a.target}</span>
          <div class="muted" style="margin:4px 0 2px;">${a.date}</div>
          <div>${U.esc(a.text)}</div>
        </div>`).join("<div class='divider'></div>")}
      </div>`;
    }

    // student card
    html += `<div class="card">
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name, "photo-circle")}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
          <div class="muted">ജനനത്തീയതി: ${U.esc(s.dob)}</div>
        </div>
      </div>
    </div>`;

    // Sadhar contact (always visible on profile)
    {
      const sadhar = DB.data.auth.sadhar;
      const sadharName = sadhar.name || "സദർ";
      const sadharPhone = sadhar.phone || "";
      html += `<div class="card">
        <div class="card-title">സദർ (Sadhar)</div>
        <div class="row">
          ${U.photoOrInitial(sadhar.photo || "", sadharName)}
          <div style="flex:1; margin-left:10px;">
            <div style="font-weight:700;">${U.esc(sadharName)}</div>
            ${sadharPhone ? `<div class="muted">${U.esc(sadharPhone)}</div>` : `<div class="muted">നമ്പർ ചേർത്തിട്ടില്ല</div>`}
          </div>
          ${sadharPhone ? `<a class="link-btn" href="tel:${sadharPhone}">വിളിക്കുക</a>` : ""}
        </div>
      </div>`;
    }

    // class teacher contact
    {
      const classTeacher = [...DB.data.auth.staff].reverse().find(t=>t.role==='teacher' && t.classes && t.classes.includes(s.cls)); // safety net: prefer the most recently assigned teacher if a class is (still) listed under more than one
      if(classTeacher){
        html += `<div class="card">
          <div class="card-title">ക്ലാസ്സ് അധ്യാപകൻ</div>
          <div class="row">
            ${U.photoOrInitial(classTeacher.photo, classTeacher.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(classTeacher.name)}</div>
              <div class="muted">${U.esc(classTeacher.phone)}</div>
            </div>
            <a class="link-btn" href="tel:${classTeacher.phone}">വിളിക്കുക</a>
          </div>
        </div>`;
      }
    }

    // recent reviews from teacher
    const reviews = DB.data.reviews.filter(r=>r.studentReg===s.reg).slice().reverse();
    if(reviews.length){
      html += `<div class="card">
        <div class="card-title">അധ്യാപകന്റെ നിർദ്ദേശങ്ങൾ</div>
        ${reviews.map(r=>`<div style="margin-bottom:8px;">
          <div class="muted">${r.date} • ${U.esc(r.from)}</div>
          <div>${U.esc(r.text)}</div>
        </div>`).join("<div class='divider'></div>")}
      </div>`;
    }

    // attendance summary (recent days)
    const dates = Object.keys(DB.data.attendance).sort().slice(-7).reverse();
    if(dates.length){
      html += `<div class="card">
        <div class="card-title">ഹാജർ (കഴിഞ്ഞ 7 ദിവസം)</div>
        <table>
          <tr><th>തീയതി</th><th>നില</th></tr>
          ${dates.map(d=>{
            const st = DB.data.attendance[d][s.id];
            let label = st==='present'?'<span class="pill green">ഹാജർ</span>': st==='absent'?'<span class="pill red">അസാന്നിധ്യം</span>':'<span class="pill">-</span>';
            return `<tr><td>${d}</td><td>${label}</td></tr>`;
          }).join("")}
        </table>
      </div>`;
    }

    // feedback box
    html += `<div class="card">
      <div class="card-title">അഭിപ്രായ പെട്ടി (Feedback)</div>
      <div class="form-group">
        <label>ആരോട്?</label>
        <input type="hidden" id="fb-target" value="sadhar">
        <div style="display:flex; gap:8px; margin-top:4px;">
          <button type="button" id="fb-target-sadhar" class="primary-btn" style="flex:1;" onclick="Parent.setFeedbackTarget('sadhar')">സദർ</button>
          <button type="button" id="fb-target-teacher" class="outline-btn" style="flex:1;" onclick="Parent.setFeedbackTarget('teacher')">ക്ലാസ്സ് അധ്യാപകൻ</button>
        </div>
      </div>
      <div class="form-group">
        <label>നിർദ്ദേശം / അഭിപ്രായം</label>
        <textarea id="fb-text" placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>
      </div>
      <button class="primary-btn" onclick="Parent.sendFeedback()">സമർപ്പിക്കുക</button>
    </div>`;

    // My sent feedback / complaints (with delete option)
    const mySadhar = DB.data.complaints.toSadhar.filter(c=>c.studentReg===s.reg).map(c=>({...c, _list:'toSadhar', _label:'സദർ'}));
    const myTeacher = DB.data.complaints.toTeacher.filter(c=>c.studentReg===s.reg).map(c=>({...c, _list:'toTeacher', _label:'ക്ലാസ്സ് അധ്യാപകൻ'}));
    const mine = mySadhar.concat(myTeacher).sort((a,b)=> (a.date<b.date?1:-1));
    if(mine.length){
      html += `<div class="section-title">എന്റെ അയച്ച അഭിപ്രായങ്ങൾ</div>`;
      mine.forEach(c=>{
        html += `<div class="card">
          <div class="row"><span class="pill">${c._label}</span><span class="muted">${c.date}</span></div>
          <p style="margin:8px 0;">${U.esc(c.text)}</p>
          <button class="btn-del" onclick="Parent.deleteFeedback('${c._list}','${c.id}')">ഡിലീറ്റ് ചെയ്യുക</button>

  setFeedbackTarget(target){
    document.getElementById("fb-target").value = target;
    const sadharBtn = document.getElementById("fb-target-sadhar");
    const teacherBtn = document.getElementById("fb-target-teacher");
    if(target === "sadhar"){
      sadharBtn.className = "primary-btn"; sadharBtn.style.flex="1";
      teacherBtn.className = "outline-btn"; teacherBtn.style.flex="1";
    } else {
      teacherBtn.className = "primary-btn"; teacherBtn.style.flex="1";
      sadharBtn.className = "outline-btn"; sadharBtn.style.flex="1";
    }
  },

  sendFeedback(){
    const target = document.getElementById("fb-target").value;
    const text = document.getElementById("fb-text").value.trim();
    if(!text){ U.toast("അഭിപ്രായം ടൈപ്പ് ചെയ്യുക"); return; }
    const s = this.me();
    if(target === "sadhar"){
      DB.data.complaints.toSadhar.push({ id: U.uid("CMP"), studentReg: s.reg, text, date: U.todayDisplay() });
    } else {
      DB.data.complaints.toTeacher.push({ id: U.uid("CMP"), studentReg: s.reg, cls: s.cls, text, date: U.todayDisplay() });
    }
    DB.save();
    document.getElementById("fb-text").value = "";
    U.toast("അഭിപ്രായം സമർപ്പിച്ചു");
    App.refresh();
  },

  deleteFeedback(list, id){
    const arr = DB.data.complaints[list];
    const idx = arr.findIndex(c=>c.id===id);
    if(idx>-1) arr.splice(idx,1);
    DB.save();
    U.toast("നീക്കം ചെയ്തു");
    App.refresh();
  },
