<style>
  :root{
    --deep:#0b3d2e;     /* deep madrasa green */
    --deep2:#0f5641;
    --gold:#d4af37;     /* gold accent */
    --gold2:#b8932c;
    --cream:#fbf6ea;    /* warm paper */
    --ink:#1c2b24;
    --rose:#b3463f;     /* absent / alert */
  }
  *{font-family:'Noto Sans Malayalam','Amiri',sans-serif;}
  .font-display{font-family:'Amiri','Noto Sans Malayalam',serif;}
  body{background:var(--cream); color:var(--ink);}
  .bg-deep{background:var(--deep);}
  .bg-deep2{background:var(--deep2);}
  .text-gold{color:var(--gold);}
  .bg-gold{background:var(--gold);}
  .border-gold{border-color:var(--gold);}
  .ring-gold{box-shadow:0 0 0 2px var(--gold);}
  .arch-card{
    border-radius:1.25rem 1.25rem .5rem .5rem;
    position:relative;
    box-shadow:0 6px 18px -8px rgba(11,61,46,.35);
  }
  .arch-card::before{
    content:"";
    position:absolute; top:0; left:50%; transform:translate(-50%,-55%);
    width:34px; height:34px; border-radius:50%;
    background:inherit; box-shadow:inherit;
  }
  .scroll-thin::-webkit-scrollbar{height:6px;width:6px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
  .tab-active{background:var(--deep); color:#fff;}
  .tab-active .ic{color:var(--gold);}
  .pill{border-radius:999px;}
  .lattice{
    background-image:
      linear-gradient(135deg, transparent 48%, rgba(212,175,55,.18) 49%, rgba(212,175,55,.18) 51%, transparent 52%),
      linear-gradient(45deg, transparent 48%, rgba(212,175,55,.18) 49%, rgba(212,175,55,.18) 51%, transparent 52%);
    background-size:22px 22px;
  }
  .modal-bg{background:rgba(11,61,46,.55);}
  .gold-divider{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .skel{background:linear-gradient(90deg,#eee 25%,#f7f7f7 37%,#eee 63%);background-size:400% 100%;animation:sk 1.4s infinite;}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}
  @media(prefers-reduced-motion:reduce){.animate-pulse,.skel{animation:none!important;}}

/* ===================== SEEDING (one-time) ===================== */
async function seedIfEmpty(){
  const snap = await db.ref('students').get();
  if(!snap.exists()){
    await db.ref('students').set(SEED_STUDENTS);
  }
  const shiftSnap = await db.ref('shiftClassMapping').get();
  if(!shiftSnap.exists()){
    await db.ref('shiftClassMapping/shifts').set({
      "1":{time:"7:30 AM - 9:00 AM", classes:["1","3","5","7","9"]},
      "2":{time:"4:00 PM - 5:30 PM", classes:["2","4","6","8","10"]},
      "3":{time:"6:00 AM - 7:00 AM", classes:["plus1","plus2"]}
    });
  }
}

/* ===================== STATE ===================== */
const state = {
  role: localStorage.getItem('mu_role') || null,
  user: JSON.parse(localStorage.getItem('mu_user')||'null'),
  tab: 'home',
  data: { students:{}, staff:{}, fees:{}, attendance:{}, holidays:[], announcements:[],
          examTimetables:{}, feeQR:{}, complaints:[], marks:{}, shiftClassMapping:{}, staffAttendance:{}, results:{} }
};

function persistSession(){
  if(state.role){ localStorage.setItem('mu_role', state.role); localStorage.setItem('mu_user', JSON.stringify(state.user||null)); }
  else { localStorage.removeItem('mu_role'); localStorage.removeItem('mu_user'); }
}

function toast(msg, ok=true){
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = ok ? '✓' : '!';
  document.getElementById('toast-msg').textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>t.classList.add('hidden'), 2600);
}

function waLink(phone, text){
  let p = (phone||'').replace(/\D/g,'');
  if(p.length===10) p = '91'+p;
  return `https://wa.me/${p}?text=${encodeURIComponent(text)}`;
}

const el = (tag, cls='', html='') => { const d=document.createElement(tag); if(cls)d.className=cls; if(html)d.innerHTML=html; return d; };

/* ===================== LIVE DATA LISTENERS ===================== */
function bindLiveData(cb){
  const paths = ['students','staff','fees','attendance','holidays','announcements','examTimetables','feeQR','complaints','marks','shiftClassMapping','staffAttendance','results'];
  paths.forEach(p=>{
    db.ref(p).on('value', snap=>{
      state.data[p] = snap.val() || (Array.isArray(state.data[p])?[]:{});
      cb && cb(p);
    });
  });
}

/* ===================== ROUTER / RENDER ===================== */
const app = document.getElementById('app');

function render(){
  app.innerHTML='';
  if(!state.role) app.appendChild(LoginScreen());
  else if(state.role==='sadhar') app.appendChild(SadharPanel());
  else if(state.role==='teacher') app.appendChild(TeacherPanel());
  else if(state.role==='management') app.appendChild(ManagementPanel());
  else if(state.role==='parent') app.appendChild(ParentPanel());
}

/* ===================== HEADER ===================== */
function Header(title, subtitle, roleLabel){
  const h = el('div','bg-deep text-white px-5 pt-6 pb-7 lattice relative overflow-hidden');
  h.innerHTML = `
    <div class="flex items-center justify-between relative z-10">
      <div>
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-full bg-gold/90 flex items-center justify-center font-display text-deep text-lg font-bold">م</div>
          <div>
            <div class="font-display text-lg leading-tight">${title}</div>
            <div class="text-[11px] text-gold/90 tracking-wide">${subtitle}</div>
          </div>
        </div>
      </div>
      ${roleLabel ? `<button id="logoutBtn" class="text-[11px] pill bg-white/10 border border-gold/40 px-3 py-1.5 hover:bg-white/20 transition">${roleLabel} · പുറത്തുപോകുക</button>` : ''}
    </div>
    <div class="gold-divider mt-4"></div>`;
  setTimeout(()=>{ const b=h.querySelector('#logoutBtn'); if(b) b.onclick=()=>{ state.role=null; state.user=null; persistSession(); render(); }; });
  return h;
}

function NavBar(items, activeKey, onSelect){
  const nav = el('div','grid bg-deep text-white border-t border-gold/30 sticky bottom-0 z-30');
  nav.style.gridTemplateColumns = `repeat(${items.length},1fr)`;
  items.forEach(it=>{
    const b = el('button', `flex flex-col items-center gap-0.5 py-2.5 text-[10px] transition ${it.key===activeKey?'tab-active':''}`);
    b.innerHTML = `<span class="ic text-base">${it.icon}</span><span>${it.label}</span>`;
    b.onclick = ()=>onSelect(it.key);
    nav.appendChild(b);
  });
  return nav;
}

/* ===================== LOGIN SCREEN ===================== */
function LoginScreen(){
  const wrap = el('div','flex-1 flex flex-col');
  wrap.appendChild(Header('മമ്പഉൽ ഉലൂം മദ്റസ','കൊറക്കോട് · 2026-2027'));

  const body = el('div','flex-1 px-5 py-6 max-w-md w-full mx-auto');
  body.innerHTML = `
    <div class="text-center mb-6">
      <div class="font-display text-2xl text-deep">സ്വാഗതം 🌙</div>
      <p class="text-sm text-deep/60 mt-1">നിങ്ങളുടെ റോൾ തിരഞ്ഞെടുത്ത് ലോഗിൻ ചെയ്യുക</p>
    </div>
    <div id="roleTabs" class="grid grid-cols-4 gap-2 mb-6"></div>
    <div id="loginFormArea"></div>
    <div class="gold-divider my-8"></div>
    <button id="publicResultBtn" class="w-full arch-card bg-deep2 text-white py-4 px-4 flex items-center justify-between hover:bg-deep transition">
      <span class="flex items-center gap-2 font-medium"><span class="text-xl">🏆</span> പബ്ലിക് റിസൾട്ട് കാണുക</span>
      <span class="text-gold text-sm">ലോഗിൻ ആവശ്യമില്ല →</span>
    </button>
  `;
  wrap.appendChild(body);

  const roles = [
    {key:'sadhar', label:'സദർ', icon:'👑'},
    {key:'teacher', label:'അധ്യാപകൻ', icon:'🧑‍🏫'},
    {key:'management', label:'മാനേജ്മെന്റ്', icon:'🏛️'},
    {key:'parent', label:'രക്ഷിതാവ്', icon:'👪'},
  ];
  let activeRole = 'sadhar';

  function paintTabs(){
    const t = body.querySelector('#roleTabs'); t.innerHTML='';
    roles.forEach(r=>{
      const b = el('button', `arch-card py-3 flex flex-col items-center gap-1 text-[11px] font-medium border transition ${activeRole===r.key?'bg-deep text-white border-deep':'bg-white text-deep border-deep/10'}`);
      b.innerHTML = `<span class="text-xl">${r.icon}</span>${r.label}`;
      b.onclick = ()=>{ activeRole=r.key; paintTabs(); paintForm(); };
      t.appendChild(b);
    });
  }

  function paintForm(){
    const f = body.querySelector('#loginFormArea');
    if(activeRole==='parent'){
      f.innerHTML = `
        <div class="space-y-3">
          <label class="text-sm font-medium text-deep/80">രജിസ്റ്റർ നമ്പർ</label>
          <input id="regInput" type="text" placeholder="ഉദാ: 691" class="w-full border-2 border-deep/15 focus:border-gold rounded-xl px-4 py-3 outline-none text-base"/>
          <button id="loginBtn" class="w-full bg-deep text-white rounded-xl py-3.5 font-medium hover:bg-deep2 transition">പ്രവേശിക്കുക</button>
        </div>`;
    } else {
      f.innerHTML = `
        <div class="space-y-3">
          <label class="text-sm font-medium text-deep/80">യൂസർനെയിം</label>
          <input id="userInput" type="text" class="w-full border-2 border-deep/15 focus:border-gold rounded-xl px-4 py-3 outline-none text-base"/>
          <label class="text-sm font-medium text-deep/80">പാസ്‌വേർഡ്</label>
          <input id="passInput" type="password" class="w-full border-2 border-deep/15 focus:border-gold rounded-xl px-4 py-3 outline-none text-base"/>
          <button id="loginBtn" class="w-full bg-deep text-white rounded-xl py-3.5 font-medium hover:bg-deep2 transition">പ്രവേശിക്കുക</button>
          ${activeRole==='sadhar' ? '<p class="text-[11px] text-deep/40 text-center pt-1">സദർ: sadhar / 6682</p>' : ''}
        </div>`;
    }
    f.querySelector('#loginBtn').onclick = ()=>doLogin(activeRole, f);
  }

  async function doLogin(role, f){
    if(role==='parent'){
      const reg = f.querySelector('#regInput').value.trim();
      const snap = await db.ref('students/'+reg).get();
      if(snap.exists() && !snap.val().deleted){
        state.role='parent'; state.user={reg, ...snap.val()}; persistSession(); toast('സ്വാഗതം!'); render();
      } else toast('രജിസ്റ്റർ നമ്പർ കണ്ടെത്താനായില്ല', false);
      return;
    }
    const u = f.querySelector('#userInput').value.trim();
    const p = f.querySelector('#passInput').value.trim();
    if(role==='sadhar'){
      if(u==='sadhar' && p==='6682'){ state.role='sadhar'; state.user={name:'സദർ'}; persistSession(); toast('സ്വാഗതം സദർ!'); render(); }
      else toast('യൂസർനെയിം/പാസ്‌വേർഡ് തെറ്റാണ്', false);
      return;
    }
    // teacher / management -> check staff node
    const staffSnap = await db.ref('staff').get();
    const staff = staffSnap.val() || {};
    const found = Object.entries(staff).find(([id,s])=> s.username===u && s.password===p && s.role===role && !s.deleted);
    if(found){ state.role=role; state.user={id:found[0], ...found[1]}; persistSession(); toast('സ്വാഗതം!'); render(); }
    else toast('പ്രവേശനം നിഷേധിച്ചു', false);
  }

  paintTabs(); paintForm();
  body.querySelector('#publicResultBtn').onclick = ()=>{ app.innerHTML=''; app.appendChild(PublicResultScreen()); };
  return wrap;
}

/* ===================== PUBLIC RESULT SCREEN ===================== */
function PublicResultScreen(){
  const wrap = el('div','flex-1 flex flex-col min-h-screen');
  wrap.appendChild(Header('പബ്ലിക് റിസൾട്ട്','മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്'));
  const body = el('div','flex-1 px-5 py-5 max-w-md w-full mx-auto');
  const classes = Object.keys(CLASS_LABEL);
  const examTypes = [['quarter','പാദ വാർഷികം'],['half','അർധ വാർഷികം'],['annual','വാർഷികം']];
  body.innerHTML = `
    <button id="backBtn" class="text-deep/60 text-sm mb-4 flex items-center gap-1">← തിരികെ</button>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <select id="clsSel" class="border-2 border-deep/15 rounded-xl px-3 py-2.5 text-sm">${classes.map(c=>`<option value="${c}">${CLASS_LABEL[c]}-ാം ക്ലാസ്</option>`).join('')}</select>
      <select id="examSel" class="border-2 border-deep/15 rounded-xl px-3 py-2.5 text-sm">${examTypes.map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
    </div>
    <div id="resultArea"></div>
  `;
  wrap.appendChild(body);
  wrap.querySelector('#backBtn').onclick = render;

  async function loadResult(){
    const cls = body.querySelector('#clsSel').value;
    const exam = body.querySelector('#examSel').value;
    const area = body.querySelector('#resultArea');
    area.innerHTML = `<div class="space-y-2">${[1,2,3].map(()=>`<div class="skel h-14 rounded-xl"></div>`).join('')}</div>`;
    const [marksSnap, studSnap] = await Promise.all([db.ref('marks').get(), db.ref('students').get()]);
    const marks = marksSnap.val() || {}; const students = studSnap.val() || {};
    const rows = [];
    Object.entries(marks).forEach(([reg,arr])=>{
      if(!students[reg] || students[reg].cls!==cls) return;
      const list = (arr||[]).filter(m=>m.examType===exam);
      if(!list.length) return;
      const total = list.reduce((s,m)=>s+Number(m.marks||0),0);
      rows.push({reg, name:students[reg].name, photo:students[reg].photo, total});
    });
    rows.sort((a,b)=>b.total-a.total);
    if(!rows.length){ area.innerHTML = `<div class="text-center text-deep/40 py-10 text-sm">ഈ പരീക്ഷയുടെ റിസൾട്ട് ലഭ്യമല്ല</div>`; return; }
    const medals=['🥇','🥈','🥉'];
    area.innerHTML = `<div class="space-y-2">` + rows.map((r,i)=>`
      <div class="arch-card bg-white border ${i<3?'border-gold':'border-deep/10'} p-3 flex items-center gap-3">
        <div class="w-9 text-center font-display text-lg">${i<3?medals[i]:i+1}</div>
        <div class="w-10 h-10 rounded-full bg-deep/10 overflow-hidden flex items-center justify-center text-deep/40 text-xs">${r.photo?`<img src="${r.photo}" class="w-full h-full object-cover"/>`:'👤'}</div>
        <div class="flex-1">
          <div class="font-medium text-sm">${r.name}</div>
          <div class="text-[11px] text-deep/40">Reg: ${r.reg}</div>
        </div>
        <div class="font-display text-lg text-deep">${r.total}</div>
      </div>`).join('') + `</div>
      <button onclick="window.print()" class="w-full mt-4 border-2 border-deep/20 text-deep rounded-xl py-2.5 text-sm font-medium">🖨️ പ്രിന്റ് / PDF</button>`;
  }
  body.querySelector('#clsSel').onchange = loadResult;
  body.querySelector('#examSel').onchange = loadResult;
  loadResult();
  return wrap;
}
